<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>光影摄影预订系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <link rel="stylesheet" href="./src/assets/styles/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, 'Microsoft YaHei', Arial, sans-serif; }
    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@3.5.3/dist/vue-router.js"></script>
  <script src="https://unpkg.com/vuex@3.6.2/dist/vuex.js"></script>
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>
  <script src="https://unpkg.com/moment@2.29.4/min/moment.min.js"></script>
  <script src="https://unpkg.com/moment@2.29.4/locale/zh-cn.js"></script>

  <script src="./src/mock/data.js?v=1"></script>
  <script src="./src/store/index.js?v=1"></script>
  <script src="./src/router/index.js?v=1"></script>

  <script src="./src/views/Packages.js?v=2"></script>
  <script src="./src/views/Booking.js?v=2"></script>
  <script src="./src/views/Schedule.js?v=2"></script>
  <script src="./src/views/Orders.js?v=2"></script>
  <script src="./src/views/Customers.js?v=2"></script>

  <script src="./src/App.js?v=2"></script>
  <script>
    // 内联初始化代码，避免缓存问题
    Vue.use(ELEMENT);
    Vue.prototype.$moment = moment;
    Vue.config.productionTip = false;

    new Vue({
      router: window.router,
      store: window.store,
      render: h => h(window.App)
    }).$mount('#app');
  </script>
</body>
</html>
