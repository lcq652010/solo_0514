<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传统铜制香插定制系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
        }
        #app {
            min-height: 100vh;
        }
        .app-container {
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        .nav-menu {
            margin-bottom: 0;
        }
        .el-menu-item {
            font-size: 16px;
        }

        .order-form-container {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .form-card {
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .card-header {
            font-size: 20px;
            font-weight: bold;
            color: #8B4513;
        }
        .order-form {
            padding: 20px 0;
        }
        .submit-btn {
            text-align: center;
            margin-top: 30px;
        }
        .el-divider__text {
            color: #8B4513;
            font-weight: bold;
        }

        .admin-panel-container {
            padding: 20px;
        }
        .panel-card {
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
        }
        .order-detail {
            line-height: 1.8;
            font-size: 13px;
        }
        .order-detail .label {
            color: #909399;
            font-weight: 500;
        }
        .stats-row {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 4px;
            margin-top: 20px;
        }
        .el-table {
            font-size: 13px;
        }
        .el-step__title {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
    <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.js"></script>
    <script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>

    <script>
        const Store = {
            state: {
                orders: [
                    {
                        id: 'ORD001',
                        customerName: '张三',
                        phone: '13800138001',
                        copperType: '紫铜',
                        holeDiameter: 3,
                        style: '莲花型',
                        engraving: true,
                        engravingContent: '平安如意',
                        status: 2,
                        createTime: '2024-01-15 10:30:00'
                    },
                    {
                        id: 'ORD002',
                        customerName: '李四',
                        phone: '13900139002',
                        copperType: '黄铜',
                        holeDiameter: 4,
                        style: '祥云型',
                        engraving: false,
                        engravingContent: '',
                        status: 4,
                        createTime: '2024-01-16 14:20:00'
                    },
                    {
                        id: 'ORD003',
                        customerName: '王五',
                        phone: '13700137003',
                        copperType: '青铜',
                        holeDiameter: 5,
                        style: '竹节型',
                        engraving: true,
                        engravingContent: '禅',
                        status: 1,
                        createTime: '2024-01-17 09:15:00'
                    }
                ],
                copperTypes: ['紫铜', '黄铜', '青铜', '白铜'],
                styles: ['莲花型', '祥云型', '竹节型', '如意型', '回纹型'],
                statusList: ['熔铜', '制模', '浇铸', '打磨', '做旧', '完工']
            },
            addOrder(order) {
                const newOrder = {
                    id: 'ORD' + String(this.state.orders.length + 1).padStart(3, '0'),
                    ...order,
                    status: 0,
                    createTime: new Date().toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    }).replace(/\//g, '-')
                };
                this.state.orders.unshift(newOrder);
                return newOrder;
            },
            updateOrderStatus(orderId, status) {
                const order = this.state.orders.find(o => o.id === orderId);
                if (order) {
                    order.status = status;
                }
            },
            getAllOrders() {
                return this.state.orders;
            },
            getCopperTypes() {
                return this.state.copperTypes;
            },
            getStyles() {
                return this.state.styles;
            },
            getStatusList() {
                return this.state.statusList;
            }
        };
    </script>

    <script>
        Vue.component('OrderForm', {
            template: `
                <div class="order-form-container">
                    <el-card class="form-card">
                        <div slot="header" class="card-header">
                            <span>传统铜制香插定制</span>
                        </div>
                        
                        <el-form :model="orderForm" :rules="rules" ref="orderForm" label-width="120px" class="order-form">
                            <el-divider content-position="left">客户信息</el-divider>
                            
                            <el-row :gutter="20">
                                <el-col :span="12">
                                    <el-form-item label="客户姓名" prop="customerName">
                                        <el-input v-model="orderForm.customerName" placeholder="请输入姓名"></el-input>
                                    </el-form-item>
                                </el-col>
                                <el-col :span="12">
                                    <el-form-item label="联系电话" prop="phone">
                                        <el-input v-model="orderForm.phone" placeholder="请输入手机号"></el-input>
                                    </el-form-item>
                                </el-col>
                            </el-row>

                            <el-divider content-position="left">定制规格</el-divider>

                            <el-row :gutter="20">
                                <el-col :span="12">
                                    <el-form-item label="铜材类型" prop="copperType">
                                        <el-select v-model="orderForm.copperType" placeholder="请选择铜材类型" style="width: 100%;">
                                            <el-option v-for="type in copperTypes" :key="type" :label="type" :value="type"></el-option>
                                        </el-select>
                                    </el-form-item>
                                </el-col>
                                <el-col :span="12">
                                    <el-form-item label="香插孔径(mm)" prop="holeDiameter">
                                        <el-input-number v-model="orderForm.holeDiameter" :min="1" :max="10" :step="0.5" :precision="1" style="width: 100%;" controls-position="right"></el-input-number>
                                    </el-form-item>
                                </el-col>
                            </el-row>

                            <el-form-item label="造型样式" prop="style">
                                <el-radio-group v-model="orderForm.style">
                                    <el-radio-button v-for="s in styles" :key="s" :label="s">
                                        {{ s }}
                                    </el-radio-button>
                                </el-radio-group>
                            </el-form-item>

                            <el-divider content-position="left">刻字服务</el-divider>

                            <el-form-item label="是否刻字">
                                <el-switch v-model="orderForm.engraving" active-text="是" inactive-text="否" @change="onEngravingChange"></el-switch>
                            </el-form-item>

                            <el-form-item label="刻字内容" prop="engravingContent">
                                <el-input 
                                    v-model="orderForm.engravingContent" 
                                    type="textarea" 
                                    :rows="3" 
                                    :disabled="!orderForm.engraving"
                                    placeholder="请输入刻字内容（建议不超过20字）"
                                    maxlength="20"
                                    show-word-limit>
                                </el-input>
                            </el-form-item>

                            <el-form-item class="submit-btn">
                                <el-button type="primary" size="large" @click="submitOrder" :loading="submitting">
                                    提交订单
                                </el-button>
                                <el-button size="large" @click="resetForm">重置</el-button>
                            </el-form-item>
                        </el-form>
                    </el-card>
                </div>
            `,
            data() {
                return {
                    submitting: false,
                    copperTypes: Store.getCopperTypes(),
                    styles: Store.getStyles(),
                    orderForm: {
                        customerName: '',
                        phone: '',
                        copperType: '',
                        holeDiameter: 3,
                        style: '',
                        engraving: false,
                        engravingContent: ''
                    },
                    rules: {
                        customerName: [
                            { required: true, message: '请输入客户姓名', trigger: 'blur' },
                            { min: 2, max: 20, message: '长度在 2 到 20 个字符', trigger: 'blur' }
                        ],
                        phone: [
                            { required: true, message: '请输入联系电话', trigger: 'blur' },
                            { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号', trigger: 'blur' }
                        ],
                        copperType: [
                            { required: true, message: '请选择铜材类型', trigger: 'change' }
                        ],
                        holeDiameter: [
                            { required: true, message: '请输入香插孔径', trigger: 'blur' },
                            { type: 'number', message: '请输入有效的数字', trigger: 'blur' },
                            { validator: (rule, value, callback) => {
                                if (value < 1 || value > 10) {
                                    callback(new Error('香插孔径范围为 1-10mm'));
                                } else {
                                    callback();
                                }
                            }, trigger: 'blur' }
                        ],
                        style: [
                            { required: true, message: '请选择造型样式', trigger: 'change' }
                        ],
                        engravingContent: [
                            { validator: (rule, value, callback) => {
                                if (this.orderForm.engraving && !value) {
                                    callback(new Error('请输入刻字内容'));
                                } else if (value && value.length > 20) {
                                    callback(new Error('刻字内容不超过20字'));
                                } else {
                                    callback();
                                }
                            }, trigger: 'blur' }
                        ]
                    }
                };
            },
            methods: {
                onEngravingChange(val) {
                    if (!val) {
                        this.orderForm.engravingContent = '';
                    }
                },
                submitOrder() {
                    this.$refs.orderForm.validate((valid) => {
                        if (valid) {
                            this.submitting = true;
                            setTimeout(() => {
                                Store.addOrder({ ...this.orderForm });
                                this.submitting = false;
                                this.$message({
                                    type: 'success',
                                    message: '订单提交成功！'
                                });
                                this.resetForm();
                            }, 1000);
                        } else {
                            this.$message.error('请完善订单信息');
                            return false;
                        }
                    });
                },
                resetForm() {
                    this.$refs.orderForm.resetFields();
                }
            }
        });

        Vue.component('AdminPanel', {
            template: `
                <div class="admin-panel-container">
                    <el-card class="panel-card">
                        <div slot="header" class="card-header">
                            <span>订单管理</span>
                            <el-button type="primary" size="small" style="float: right;" @click="refreshOrders">
                                <i class="el-icon-refresh"></i> 刷新
                            </el-button>
                        </div>

                        <el-table :data="orders" border style="width: 100%" v-loading="loading">
                            <el-table-column prop="id" label="订单号" width="120" align="center"></el-table-column>
                            <el-table-column prop="customerName" label="客户姓名" width="100" align="center"></el-table-column>
                            <el-table-column prop="phone" label="联系电话" width="130" align="center"></el-table-column>
                            <el-table-column label="定制详情" min-width="250">
                                <template slot-scope="scope">
                                    <div class="order-detail">
                                        <p><span class="label">铜材：</span>{{ scope.row.copperType }}</p>
                                        <p><span class="label">孔径：</span>{{ scope.row.holeDiameter }}mm</p>
                                        <p><span class="label">样式：</span>{{ scope.row.style }}</p>
                                        <p v-if="scope.row.engraving">
                                            <span class="label">刻字：</span>{{ scope.row.engravingContent }}
                                        </p>
                                    </div>
                                </template>
                            </el-table-column>
                            <el-table-column label="生产工序" width="320" align="center">
                                <template slot-scope="scope">
                                    <el-steps :active="scope.row.status" finish-status="success" align-center size="small">
                                        <el-step v-for="(status, index) in statusList" :key="index" :title="status"></el-step>
                                    </el-steps>
                                </template>
                            </el-table-column>
                            <el-table-column label="操作" width="200" align="center">
                                <template slot-scope="scope">
                                    <el-select 
                                        v-model="scope.row.status" 
                                        size="small" 
                                        style="width: 120px;"
                                        @change="updateStatus(scope.row.id, scope.row.status, scope.$index)">
                                        <el-option 
                                            v-for="(status, index) in statusList" 
                                            :key="index" 
                                            :label="status" 
                                            :value="index"
                                            :disabled="!isStatusSelectable(index, scope.row.status)">
                                        </el-option>
                                    </el-select>
                                </template>
                            </el-table-column>
                            <el-table-column prop="createTime" label="创建时间" width="180" align="center"></el-table-column>
                        </el-table>

                        <div class="stats-row">
                            <el-row :gutter="20">
                                <el-col :span="6">
                                    <el-statistic title="总订单数" :value="orders.length" :value-style="{ color: '#409EFF' }">
                                        <template #suffix>单</template>
                                    </el-statistic>
                                </el-col>
                                <el-col :span="6">
                                    <el-statistic title="进行中" :value="pendingCount" :value-style="{ color: '#E6A23C' }">
                                        <template #suffix>单</template>
                                    </el-statistic>
                                </el-col>
                                <el-col :span="6">
                                    <el-statistic title="已完工" :value="completedCount" :value-style="{ color: '#67C23A' }">
                                        <template #suffix>单</template>
                                    </el-statistic>
                                </el-col>
                                <el-col :span="6">
                                    <el-statistic title="完工率" :value="completionRate" :value-style="{ color: '#909399' }">
                                        <template #suffix>%</template>
                                    </el-statistic>
                                </el-col>
                            </el-row>
                        </div>
                    </el-card>
                </div>
            `,
            data() {
                return {
                    loading: false,
                    statusList: Store.getStatusList()
                };
            },
            computed: {
                orders() {
                    return Store.getAllOrders();
                },
                pendingCount() {
                    return this.orders.filter(o => o.status < 5).length;
                },
                completedCount() {
                    return this.orders.filter(o => o.status === 5).length;
                },
                completionRate() {
                    if (this.orders.length === 0) return 0;
                    return ((this.completedCount / this.orders.length) * 100).toFixed(1);
                }
            },
            methods: {
                refreshOrders() {
                    this.loading = true;
                    setTimeout(() => {
                        this.loading = false;
                        this.$message({
                            type: 'success',
                            message: '数据已刷新'
                        });
                    }, 500);
                },
                isStatusSelectable(targetStatus, currentStatus) {
                    if (currentStatus === 5) return targetStatus === 5;
                    return targetStatus === currentStatus || targetStatus === currentStatus + 1;
                },
                updateStatus(orderId, newStatus, index) {
                    const currentStatus = this.orders[index].status;
                    if (currentStatus === 5) {
                        this.$message.warning('已完工订单不可修改');
                        this.orders[index].status = 5;
                        return;
                    }
                    if (newStatus < currentStatus) {
                        this.$message.error('工序不可回退，只能向后推进');
                        this.orders[index].status = currentStatus;
                        return;
                    }
                    if (newStatus > currentStatus + 1) {
                        this.$message.error('不允许跳步，只能按顺序切换工序');
                        this.orders[index].status = currentStatus;
                        return;
                    }
                    Store.updateOrderStatus(orderId, newStatus);
                    this.$message({
                        type: 'success',
                        message: '工序已更新至' + this.statusList[newStatus]
                    });
                }
            }
        });
    </script>

    <script>
        Vue.use(VueRouter);
        Vue.use(ElementUI);

        const routes = [
            {
                path: '/',
                redirect: '/order'
            },
            {
                path: '/order',
                component: {
                    template: '<order-form></order-form>'
                }
            },
            {
                path: '/admin',
                component: {
                    template: '<admin-panel></admin-panel>'
                }
            }
        ];

        const router = new VueRouter({
            routes
        });

        const App = {
            template: `
                <div class="app-container">
                    <el-menu 
                        :default-active="activeRoute" 
                        mode="horizontal" 
                        router
                        class="nav-menu"
                        background-color="#8B4513"
                        text-color="#fff"
                        active-text-color="#ffd04b">
                        <el-menu-item index="/order">
                            <i class="el-icon-s-order"></i>
                            <span>客户下单</span>
                        </el-menu-item>
                        <el-menu-item index="/admin">
                            <i class="el-icon-s-custom"></i>
                            <span>管理员</span>
                        </el-menu-item>
                    </el-menu>
                    <router-view></router-view>
                </div>
            `,
            computed: {
                activeRoute() {
                    return this.$route.path;
                }
            }
        };

        new Vue({
            el: '#app',
            router,
            render: h => h(App)
        });
    </script>
</body>
</html>
