<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>传统陶瓷茶宠定制平台</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
  <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f5f0e8;
    }
    .el-header {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      color: white;
      padding: 0;
    }
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      padding: 0 20px;
    }
    .title {
      font-size: 24px;
      margin: 0;
      font-weight: 600;
    }
    .nav-menu {
      background: transparent;
      border: none;
    }
    .nav-menu .el-menu-item {
      color: rgba(255,255,255,0.9);
    }
    .nav-menu .el-menu-item:hover,
    .nav-menu .el-menu-item.is-active {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .el-main {
      background: #f5f0e8;
      padding: 30px;
      min-height: calc(100vh - 120px);
    }
    .el-footer {
      background: #3d2914;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 60px;
      font-size: 14px;
    }
    .page-title {
      text-align: center;
      color: #5D4037;
      font-size: 28px;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .page-card {
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(139, 69, 19, 0.1);
      border-radius: 12px;
    }
    .section-title {
      color: #6D4C41;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #D7CCC8;
    }
    .radio-item {
      display: block;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid #D7CCC8;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .radio-item:hover {
      border-color: #8B4513;
      background: #FAF6F0;
    }
    .radio-label {
      font-weight: 600;
      color: #5D4037;
      margin-right: 10px;
    }
    .radio-desc {
      font-size: 13px;
      color: #8D6E63;
    }
    .step-icon {
      display: inline-block;
      width: 24px;
      height: 24px;
      line-height: 24px;
      text-align: center;
      border-radius: 50%;
      background: #E0E0E0;
      color: #999;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .step-icon.active {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      color: white;
    }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      border: none;
    }
    .admin-card {
      max-width: 1200px;
    }
  </style>
</head>
<body>
  <div id="app">
    <el-container>
      <el-header>
        <div class="header-content">
          <h1 class="title">🏺 传统陶瓷茶宠定制平台</h1>
          <el-menu mode="horizontal" :default-active="$route.path" class="nav-menu" router>
            <el-menu-item index="/">客户下单</el-menu-item>
            <el-menu-item index="/admin">管理员后台</el-menu-item>
          </el-menu>
        </div>
      </el-header>
      <el-main>
        <router-view></router-view>
      </el-main>
      <el-footer>
        <p>© 2024 传统陶瓷茶宠定制平台 - 传承匠心工艺，打造精品茶宠</p>
      </el-footer>
    </el-container>
  </div>

  <script>
    const store = Vue.observable({
      orders: [
        {
          id: 'ORD001',
          customerName: '张三',
          phone: '13800138001',
          clayType: '紫砂泥',
          shape: '貔貅',
          height: 12,
          width: 8,
          glazeEffect: '哑光釉',
          status: 3,
          createTime: '2024-01-15 10:30:00',
          processLogs: [
            { status: 0, operator: '李师傅', time: '2024-01-15 10:35:00', remark: '开始揉泥' },
            { status: 1, operator: '李师傅', time: '2024-01-15 14:20:00', remark: '完成拉坯' },
            { status: 2, operator: '王师傅', time: '2024-01-15 16:45:00', remark: '塑形完成' },
            { status: 3, operator: '王师傅', time: '2024-01-16 09:00:00', remark: '晾干完成' }
          ]
        },
        {
          id: 'ORD002',
          customerName: '李四',
          phone: '13800138002',
          clayType: '陶泥',
          shape: '金蟾',
          height: 10,
          width: 10,
          glazeEffect: '亮面釉',
          status: 5,
          createTime: '2024-01-16 14:20:00',
          processLogs: [
            { status: 0, operator: '张师傅', time: '2024-01-16 15:00:00', remark: '开始揉泥' },
            { status: 1, operator: '张师傅', time: '2024-01-16 17:30:00', remark: '完成拉坯' },
            { status: 2, operator: '李师傅', time: '2024-01-17 09:00:00', remark: '塑形完成' },
            { status: 3, operator: '李师傅', time: '2024-01-18 08:30:00', remark: '晾干完成' },
            { status: 4, operator: '王师傅', time: '2024-01-18 10:15:00', remark: '施釉完成' },
            { status: 5, operator: '张师傅', time: '2024-01-18 14:00:00', remark: '入窑烧制' }
          ]
        },
        {
          id: 'ORD003',
          customerName: '王五',
          phone: '13800138003',
          clayType: '紫砂泥',
          shape: '麒麟',
          height: 15,
          width: 10,
          glazeEffect: '窑变釉',
          status: 7,
          createTime: '2024-01-17 09:15:00',
          processLogs: [
            { status: 0, operator: '王师傅', time: '2024-01-17 10:00:00', remark: '开始揉泥' },
            { status: 1, operator: '王师傅', time: '2024-01-17 12:30:00', remark: '完成拉坯' },
            { status: 2, operator: '张师傅', time: '2024-01-17 15:00:00', remark: '塑形完成' },
            { status: 3, operator: '张师傅', time: '2024-01-18 09:00:00', remark: '晾干完成' },
            { status: 4, operator: '李师傅', time: '2024-01-18 11:00:00', remark: '施釉完成' },
            { status: 5, operator: '李师傅', time: '2024-01-18 15:30:00', remark: '入窑烧制' },
            { status: 6, operator: '王师傅', time: '2024-01-19 08:30:00', remark: '质检通过' },
            { status: 7, operator: '管理员', time: '2024-01-19 10:00:00', remark: '订单完工' }
          ]
        }
      ],
      processSteps: ['揉泥', '拉坯', '塑形', '晾干', '施釉', '烧制', '质检', '完工'],
      currentUser: '管理员'
    })

    const OrderForm = {
      template: `
        <div>
          <h2 class="page-title">🍵 茶宠定制下单</h2>
          <el-card class="page-card">
            <el-form :model="orderForm" :rules="rules" ref="orderForm" label-width="120px">
              <div class="section-title">客户信息</div>
              <el-row :gutter="20">
                <el-col :span="12">
                  <el-form-item label="客户姓名" prop="customerName">
                    <el-input v-model="orderForm.customerName" placeholder="请输入您的姓名"></el-input>
                  </el-form-item>
                </el-col>
                <el-col :span="12">
                  <el-form-item label="联系电话" prop="phone">
                    <el-input v-model="orderForm.phone" placeholder="请输入联系电话"></el-input>
                  </el-form-item>
                </el-col>
              </el-row>

              <div class="section-title">茶宠规格选择</div>
              <el-form-item label="泥料类型" prop="clayType">
                <el-radio-group v-model="orderForm.clayType">
                  <el-radio label="紫砂泥" class="radio-item">
                    <span class="radio-label">紫砂泥</span>
                    <span class="radio-desc">- 透气性好，质感细腻</span>
                  </el-radio>
                  <el-radio label="陶泥" class="radio-item">
                    <span class="radio-label">陶泥</span>
                    <span class="radio-desc">- 可塑性强，古朴典雅</span>
                  </el-radio>
                  <el-radio label="瓷泥" class="radio-item">
                    <span class="radio-label">瓷泥</span>
                    <span class="radio-desc">- 质地洁白，细腻光滑</span>
                  </el-radio>
                  <el-radio label="粗陶泥" class="radio-item">
                    <span class="radio-label">粗陶泥</span>
                    <span class="radio-desc">- 粗犷自然，复古风格</span>
                  </el-radio>
                </el-radio-group>
              </el-form-item>

              <el-form-item label="茶宠造型" prop="shape">
                <el-select v-model="orderForm.shape" placeholder="请选择茶宠造型" style="width: 100%">
                  <el-option label="貔貅 - 招财进宝" value="貔貅"></el-option>
                  <el-option label="金蟾 - 财源广进" value="金蟾"></el-option>
                  <el-option label="麒麟 - 吉祥如意" value="麒麟"></el-option>
                  <el-option label="龙龟 - 镇宅辟邪" value="龙龟"></el-option>
                  <el-option label="佛手 - 福在眼前" value="佛手"></el-option>
                  <el-option label="莲花 - 清净高洁" value="莲花"></el-option>
                </el-select>
              </el-form-item>

              <el-row :gutter="20">
                <el-col :span="12">
                  <el-form-item label="高度 (cm)" prop="height">
                    <el-input-number 
                      v-model.number="orderForm.height" 
                      :min="5" 
                      :max="50" 
                      :step="1"
                      :precision="0"
                      style="width: 100%"
                      placeholder="建议5-50cm">
                    </el-input-number>
                    <div style="font-size: 12px; color: #999; margin-top: -10px;">茶宠高度建议 5-50cm</div>
                  </el-form-item>
                </el-col>
                <el-col :span="12">
                  <el-form-item label="宽度 (cm)" prop="width">
                    <el-input-number 
                      v-model.number="orderForm.width" 
                      :min="5" 
                      :max="50" 
                      :step="1"
                      :precision="0"
                      style="width: 100%"
                      placeholder="建议5-50cm">
                    </el-input-number>
                    <div style="font-size: 12px; color: #999; margin-top: -10px;">茶宠宽度建议 5-50cm</div>
                  </el-form-item>
                </el-col>
              </el-row>

              <el-form-item label="釉面效果" prop="glazeEffect">
                <el-radio-group v-model="orderForm.glazeEffect">
                  <el-radio-button label="哑光釉">哑光釉</el-radio-button>
                  <el-radio-button label="亮面釉">亮面釉</el-radio-button>
                  <el-radio-button label="窑变釉">窑变釉</el-radio-button>
                  <el-radio-button label="裂纹釉">裂纹釉</el-radio-button>
                  <el-radio-button label="无釉">无釉</el-radio-button>
                </el-radio-group>
              </el-form-item>

              <el-form-item label="备注说明">
                <el-input type="textarea" :rows="4" placeholder="请输入其他定制要求或备注信息..." v-model="orderForm.remark"></el-input>
              </el-form-item>

              <el-form-item>
                <el-button type="primary" size="large" @click="submitOrder" class="submit-btn">
                  <i class="el-icon-check"></i> 提交定制订单
                </el-button>
              </el-form-item>
            </el-form>
          </el-card>
        </div>
      `,
      data() {
        return {
          orderForm: {
            customerName: '',
            phone: '',
            clayType: '',
            shape: '',
            height: 10,
            width: 10,
            glazeEffect: '',
            remark: ''
          },
          rules: {
            customerName: [
              { required: true, message: '请输入客户姓名', trigger: 'blur' },
              { min: 2, max: 20, message: '姓名长度在 2 到 20 个字符', trigger: 'blur' }
            ],
            phone: [
              { required: true, message: '请输入联系电话', trigger: 'blur' },
              { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
            ],
            clayType: [
              { required: true, message: '请选择泥料类型', trigger: 'change' }
            ],
            shape: [
              { required: true, message: '请选择茶宠造型', trigger: 'change' }
            ],
            height: [
              { required: true, message: '请输入高度', trigger: 'blur' },
              { type: 'number', min: 5, max: 50, message: '高度需在 5-50cm 之间', trigger: 'blur' }
            ],
            width: [
              { required: true, message: '请输入宽度', trigger: 'blur' },
              { type: 'number', min: 5, max: 50, message: '宽度需在 5-50cm 之间', trigger: 'blur' }
            ],
            glazeEffect: [
              { required: true, message: '请选择釉面效果', trigger: 'change' }
            ]
          }
        }
      },
      methods: {
        submitOrder() {
          this.$refs.orderForm.validate((valid) => {
            if (valid) {
              this.$loading({
                lock: true,
                text: '订单提交中...',
                spinner: 'el-icon-loading',
                background: 'rgba(0, 0, 0, 0.7)'
              })
              setTimeout(() => {
                const maxId = store.orders.reduce((max, o) => {
                  const num = parseInt(o.id.replace('ORD', ''))
                  return num > max ? num : max
                }, 0)
                const newOrder = {
                  ...this.orderForm,
                  height: Number(this.orderForm.height),
                  width: Number(this.orderForm.width),
                  id: 'ORD' + String(maxId + 1).padStart(3, '0'),
                  status: 0,
                  createTime: new Date().toLocaleString('zh-CN'),
                  processLogs: [
                    {
                      status: 0,
                      operator: '系统',
                      time: new Date().toLocaleString('zh-CN'),
                      remark: '订单创建，开始揉泥工序'
                    }
                  ]
                }
                store.orders.unshift(newOrder)
                this.$loading().close()
                this.$message({
                  message: '订单提交成功！已显示在订单列表第一行。',
                  type: 'success',
                  duration: 3000
                })
                this.$refs.orderForm.resetFields()
              }, 800)
            } else {
              this.$message.error('请完善订单信息后再提交')
              return false
            }
          })
        }
      }
    }

    const AdminDashboard = {
      template: `
        <div>
          <h2 class="page-title">📋 订单管理后台</h2>
          <el-card class="page-card admin-card">
            <div style="margin-bottom: 20px;">
              <el-button type="primary" icon="el-icon-refresh" @click="refreshData">刷新数据</el-button>
              <span style="margin-left: 20px; color: #6D4C41;">
                <strong>订单总数：</strong>{{ orders.length }} 单
              </span>
            </div>

            <el-table :data="orders" border style="width: 100%" stripe>
              <el-table-column prop="id" label="订单编号" width="100" align="center">
                <template slot-scope="scope">
                  <el-tag type="info" size="small">{{ scope.row.id }}</el-tag>
                </template>
              </el-table-column>

              <el-table-column prop="customerName" label="客户信息" width="180">
                <template slot-scope="scope">
                  <div><strong>{{ scope.row.customerName }}</strong></div>
                  <div style="font-size: 12px; color: #999;">{{ scope.row.phone }}</div>
                </template>
              </el-table-column>

              <el-table-column label="茶宠详情" width="220">
                <template slot-scope="scope">
                  <div><strong>造型：</strong>{{ scope.row.shape }}</div>
                  <div><strong>泥料：</strong>{{ scope.row.clayType }}</div>
                  <div style="font-size: 12px; color: #999;">
                    尺寸：{{ scope.row.height }}×{{ scope.row.width }}cm | {{ scope.row.glazeEffect }}
                  </div>
                </template>
              </el-table-column>

              <el-table-column prop="status" label="生产进度" width="400">
                <template slot-scope="scope">
                  <el-steps :active="scope.row.status" finish-status="success" align-center size="small">
                    <el-step v-for="(step, index) in processSteps" :key="index" :title="step">
                      <template slot="icon">
                        <span :class="['step-icon', { active: index <= scope.row.status }]">
                          {{ index + 1 }}
                        </span>
                      </template>
                    </el-step>
                  </el-steps>
                </template>
              </el-table-column>

              <el-table-column prop="createTime" label="下单时间" width="160" align="center">
                <template slot-scope="scope">
                  <div style="font-size: 12px;">{{ scope.row.createTime }}</div>
                </template>
              </el-table-column>

              <el-table-column label="操作" width="120" align="center" fixed="right">
                <template slot-scope="scope">
                  <el-button size="mini" type="primary" icon="el-icon-edit" @click="openProcessDialog(scope.row)">
                    更新工序
                  </el-button>
                </template>
              </el-table-column>
            </el-table>
          </el-card>

          <el-dialog title="更新生产工序" :visible.sync="dialogVisible" width="600px">
            <div v-if="currentOrder">
              <div style="margin-bottom: 20px; padding: 15px; background: #FAF6F0; border-radius: 8px;">
                <p><strong>订单编号：</strong>{{ currentOrder.id }}</p>
                <p><strong>客户姓名：</strong>{{ currentOrder.customerName }}</p>
                <p><strong>茶宠造型：</strong>{{ currentOrder.shape }}</p>
                <p><strong>当前工序：</strong>{{ processSteps[currentOrder.status] }}</p>
              </div>

              <div v-if="currentOrder.status < processSteps.length - 1">
                <div class="section-title">推进工序</div>
                <el-alert
                  :title="'即将推进至：' + processSteps[currentOrder.status + 1] + ' 工序'"
                  type="info"
                  :closable="false"
                  style="margin-bottom: 15px;">
                </el-alert>
                
                <el-form label-width="80px" style="margin-top: 20px;">
                  <el-form-item label="操作人">
                    <el-input v-model="processForm.operator" placeholder="请输入操作人姓名"></el-input>
                  </el-form-item>
                  <el-form-item label="操作备注">
                    <el-input 
                      type="textarea" 
                      :rows="3" 
                      v-model="processForm.remark"
                      :placeholder="'请输入' + processSteps[currentOrder.status + 1] + '工序的操作备注'">
                    </el-input>
                  </el-form-item>
                </el-form>
              </div>
              <div v-else>
                <el-alert
                  title="该订单已完成全部生产工序"
                  type="success"
                  :closable="false">
                </el-alert>
              </div>

              <div class="section-title" style="margin-top: 25px;">操作记录</div>
              <el-timeline style="max-height: 250px; overflow-y: auto;">
                <el-timeline-item
                  v-for="(log, index) in currentOrder.processLogs"
                  :key="index"
                  :timestamp="log.time"
                  placement="top"
                  :type="getLogType(log.status)">
                  <div>
                    <p style="font-weight: 600; margin-bottom: 5px;">
                      {{ processSteps[log.status] }}
                    </p>
                    <p style="font-size: 13px; color: #666; margin: 0;">
                      操作人：{{ log.operator }}
                    </p>
                    <p v-if="log.remark" style="font-size: 12px; color: #999; margin: 3px 0 0 0;">
                      备注：{{ log.remark }}
                    </p>
                  </div>
                </el-timeline-item>
              </el-timeline>
            </div>

            <span slot="footer" class="dialog-footer">
              <el-button @click="dialogVisible = false">取 消</el-button>
              <el-button 
                type="primary" 
                @click="nextProcess" 
                :disabled="currentOrder?.status >= processSteps.length - 1 || !processForm.operator">
                <i class="el-icon-arrow-right"></i> 推进到下一工序
              </el-button>
            </span>
          </el-dialog>
        </div>
      `,
      data() {
        return {
          dialogVisible: false,
          currentOrder: null,
          processForm: {
            operator: '',
            remark: ''
          }
        }
      },
      computed: {
        orders() {
          return store.orders
        },
        processSteps() {
          return store.processSteps
        }
      },
      methods: {
        getLogType(status) {
          const types = ['primary', 'success', 'warning', 'danger', 'info']
          return types[status % types.length]
        },
        refreshData() {
          this.$message({
            message: '数据已刷新',
            type: 'success',
            duration: 1500
          })
        },
        openProcessDialog(order) {
          this.currentOrder = { ...order, processLogs: order.processLogs ? [...order.processLogs] : [] }
          this.processForm = {
            operator: store.currentUser || '',
            remark: ''
          }
          this.dialogVisible = true
        },
        nextProcess() {
          if (this.currentOrder.status >= this.processSteps.length - 1) {
            this.$message.warning('该订单已完成全部生产工序')
            return
          }
          if (!this.processForm.operator) {
            this.$message.warning('请输入操作人姓名')
            return
          }
          const order = store.orders.find(o => o.id === this.currentOrder.id)
          if (order) {
            const nextStatus = order.status + 1
            order.status = nextStatus
            const log = {
              status: nextStatus,
              operator: this.processForm.operator,
              time: new Date().toLocaleString('zh-CN'),
              remark: this.processForm.remark || `完成${this.processSteps[nextStatus]}工序`
            }
            if (!order.processLogs) {
              Vue.set(order, 'processLogs', [])
            }
            order.processLogs.push(log)
            this.currentOrder.status = nextStatus
            this.currentOrder.processLogs.push(log)
            this.processForm.remark = ''
            this.$message({
              message: `订单 ${this.currentOrder.id} 已推进至「${this.processSteps[nextStatus]}」工序，操作人：${log.operator}`,
              type: 'success'
            })
            if (nextStatus >= this.processSteps.length - 1) {
              setTimeout(() => {
                this.dialogVisible = false
              }, 1000)
            }
          }
        }
      }
    }

    const routes = [
      { path: '/', component: OrderForm },
      { path: '/admin', component: AdminDashboard }
    ]

    const router = new VueRouter({
      routes
    })

    const app = new Vue({
      router
    }).$mount('#app')
  </script>
</body>
</html>
