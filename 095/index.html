<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>传统竹雕笔筒定制订单系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 30px 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .nav-tabs {
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
    }
    .form-card, .table-card {
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    .form-title, .table-title {
      font-size: 24px;
      color: #333;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #667eea;
    }
    .step-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .step-0 { background: #e0e0e0; color: #666; }
    .step-1 { background: #b3e5fc; color: #0277bd; }
    .step-2 { background: #81d4fa; color: #01579b; }
    .step-3 { background: #4fc3f7; color: #01579b; }
    .step-4 { background: #29b6f6; color: #01579b; }
    .step-5 { background: #03a9f4; color: white; }
    .step-6 { background: #4caf50; color: white; }
    .step-7 { background: #2e7d32; color: white; }
    .pattern-preview {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      border: 2px solid #ddd;
    }
    .el-select-dropdown__item {
      height: auto;
      padding: 10px;
    }
    .pattern-option {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pattern-option .icon {
      font-size: 28px;
    }
  </style>
</head>
<body>
  <div id="app" class="app-container">
    <div class="header">
      <h1>🎋 传统竹雕笔筒定制订单系统</h1>
      <p>匠心独运，传承千年竹艺文化</p>
    </div>

    <div class="nav-tabs">
      <el-tabs v-model="activeTab" type="card" @tab-click="handleTabClick">
        <el-tab-pane label="客户下单" name="order"></el-tab-pane>
        <el-tab-pane label="管理员管理" name="admin"></el-tab-pane>
      </el-tabs>
    </div>

    <div v-show="activeTab === 'order'" class="form-card">
      <h2 class="form-title">📝 定制订单</h2>
      <el-form :model="orderForm" :rules="formRules" ref="orderForm" label-width="140px">
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="客户姓名" prop="customerName">
              <el-input v-model="orderForm.customerName" placeholder="请输入您的姓名"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="联系电话" prop="phone">
              <el-input v-model="orderForm.phone" placeholder="请输入联系电话"></el-input>
            </el-form-item>
          </el-col>
        </el-row>

        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="竹材年份" prop="bambooYear">
              <el-select v-model="orderForm.bambooYear" placeholder="请选择竹材年份" style="width: 100%">
                <el-option label="1年竹（新竹）" value="1年竹"></el-option>
                <el-option label="3年竹（优质）" value="3年竹"></el-option>
                <el-option label="5年竹（精品）" value="5年竹"></el-option>
                <el-option label="8年以上老竹（珍藏）" value="8年以上老竹"></el-option>
              </el-select>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="雕刻工艺" prop="craftType">
              <el-radio-group v-model="orderForm.craftType">
                <el-radio label="阴雕">阴雕</el-radio>
                <el-radio label="阳雕">阳雕</el-radio>
              </el-radio-group>
            </el-form-item>
          </el-col>
        </el-row>

        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="笔筒高度 (cm)" prop="height">
              <el-input-number v-model="orderForm.height" :min="10" :max="30" :step="1" style="width: 100%"></el-input-number>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="筒身直径 (cm)" prop="diameter">
              <el-input-number v-model="orderForm.diameter" :min="5" :max="15" :step="0.5" style="width: 100%"></el-input-number>
            </el-form-item>
          </el-col>
        </el-row>

        <el-form-item label="雕刻图案" prop="pattern">
          <el-select v-model="orderForm.pattern" placeholder="请选择雕刻图案" style="width: 100%">
            <el-option value="山水风景">
              <div class="pattern-option">
                <span class="icon">🏔️</span>
                <span>山水风景</span>
              </div>
            </el-option>
            <el-option value="花鸟虫鱼">
              <div class="pattern-option">
                <span class="icon">🌸</span>
                <span>花鸟虫鱼</span>
              </div>
            </el-option>
            <el-option value="梅兰竹菊">
              <div class="pattern-option">
                <span class="icon">🎋</span>
                <span>梅兰竹菊</span>
              </div>
            </el-option>
            <el-option value="诗词书法">
              <div class="pattern-option">
                <span class="icon">📜</span>
                <span>诗词书法</span>
              </div>
            </el-option>
            <el-option value="龙凤呈祥">
              <div class="pattern-option">
                <span class="icon">🐉</span>
                <span>龙凤呈祥</span>
              </div>
            </el-option>
            <el-option value="定制图案">
              <div class="pattern-option">
                <span class="icon">🎨</span>
                <span>定制图案（需联系客服）</span>
              </div>
            </el-option>
          </el-select>
        </el-form-item>

        <el-form-item label="备注说明">
          <el-input type="textarea" v-model="orderForm.remark" :rows="3" placeholder="如有特殊要求请在此说明..."></el-input>
        </el-form-item>

        <el-form-item>
          <el-button type="primary" size="large" @click="submitOrder" :loading="submitting">
            <i class="el-icon-check"></i> 提交订单
          </el-button>
          <el-button size="large" @click="resetForm">重置表单</el-button>
        </el-form-item>
      </el-form>
    </div>

    <div v-show="activeTab === 'admin'" class="table-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 class="table-title" style="margin: 0;">📋 订单管理</h2>
        <el-button type="primary" icon="el-icon-refresh" @click="refreshOrderList" :loading="loading">
          刷新列表
        </el-button>
      </div>
      
      <el-table :data="orders" border stripe style="width: 100%" v-loading="loading">
        <el-table-column type="index" label="序号" width="60" align="center"></el-table-column>
        <el-table-column prop="orderNo" label="订单号" width="160" align="center"></el-table-column>
        <el-table-column prop="customerName" label="客户姓名" width="100" align="center"></el-table-column>
        <el-table-column prop="phone" label="联系电话" width="130" align="center"></el-table-column>
        <el-table-column label="竹材规格" width="180" align="center">
          <template slot-scope="scope">
            <div>{{ scope.row.bambooYear }}</div>
            <div style="font-size: 12px; color: #666;">
              H:{{ scope.row.height }}cm × D:{{ scope.row.diameter }}cm
            </div>
          </template>
        </el-table-column>
        <el-table-column prop="pattern" label="图案" width="100" align="center"></el-table-column>
        <el-table-column prop="craftType" label="工艺" width="80" align="center"></el-table-column>
        <el-table-column label="生产进度" width="150" align="center">
          <template slot-scope="scope">
            <span class="step-badge" :class="'step-' + scope.row.currentStep">
              {{ stepLabels[scope.row.currentStep] }}
            </span>
          </template>
        </el-table-column>
        <el-table-column prop="createTime" label="下单时间" width="160" align="center"></el-table-column>
        <el-table-column label="操作" width="250" align="center">
          <template slot-scope="scope">
            <el-button size="small" type="info" icon="el-icon-view" @click="viewStepHistory(scope.row)">
              历史
            </el-button>
            <el-button size="small" type="primary" @click="updateStep(scope.row)" :disabled="scope.row.currentStep >= 7">
              下一流程
            </el-button>
            <el-button size="small" type="danger" @click="deleteOrder(scope.row)" :disabled="scope.row.currentStep >= 7">
              删除
            </el-button>
          </template>
        </el-table-column>
      </el-table>

      <el-dialog :title="`订单【${currentOrder.orderNo || ''}】工序历史`" :visible.sync="stepDialogVisible" width="600px">
        <el-timeline>
          <el-timeline-item
            v-for="(item, index) in (currentOrder.stepHistory || []).slice().reverse()"
            :key="index"
            :timestamp="item.time"
            placement="top"
            :type="item.step === 7 ? 'success' : 'primary'"
            :icon="item.step === 7 ? 'el-icon-check' : ''">
            <div style="font-weight: bold;">{{ stepLabels[item.step] }}</div>
            <div style="color: #666; font-size: 13px;">
              操作人：{{ item.operator }}
            </div>
            <div style="color: #999; font-size: 12px;">{{ item.remark }}</div>
          </el-timeline-item>
        </el-timeline>
        <div v-if="!currentOrder.stepHistory || currentOrder.stepHistory.length === 0" style="text-align: center; padding: 30px; color: #999;">
          暂无工序记录
        </div>
        <span slot="footer" class="dialog-footer">
          <el-button @click="stepDialogVisible = false">关闭</el-button>
        </span>
      </el-dialog>
    </div>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        activeTab: 'order',
        submitting: false,
        loading: false,
        stepDialogVisible: false,
        currentOrder: {},
        stepLabels: ['待处理', '选竹', '锯切', '车圆', '雕刻', '打磨', '上漆', '完工'],
        orderForm: {
          customerName: '',
          phone: '',
          bambooYear: '',
          height: 15,
          diameter: 8,
          pattern: '',
          craftType: '阴雕',
          remark: ''
        },
        formRules: {
          customerName: [
            { required: true, message: '请输入客户姓名', trigger: 'blur' }
          ],
          phone: [
            { required: true, message: '请输入联系电话', trigger: 'blur' },
            { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
          ],
          bambooYear: [
            { required: true, message: '请选择竹材年份', trigger: 'change' }
          ],
          height: [
            { required: true, message: '请输入笔筒高度', trigger: 'change' },
            { type: 'number', min: 10, max: 30, message: '高度须在 10-30cm 之间', trigger: 'change' }
          ],
          diameter: [
            { required: true, message: '请输入筒身直径', trigger: 'change' },
            { type: 'number', min: 5, max: 15, message: '直径须在 5-15cm 之间', trigger: 'change' }
          ],
          pattern: [
            { required: true, message: '请选择雕刻图案', trigger: 'change' }
          ],
          craftType: [
            { required: true, message: '请选择雕刻工艺', trigger: 'change' }
          ]
        },
        currentOperator: '管理员',
        orders: [
          {
            orderNo: 'BD20240516001',
            customerName: '张三',
            phone: '13800138001',
            bambooYear: '5年竹',
            height: 18,
            diameter: 10,
            pattern: '山水风景',
            craftType: '阴雕',
            currentStep: 3,
            remark: '希望图案清晰一些',
            createTime: '2024-05-16 09:30:00',
            stepHistory: [
              { step: 0, operator: '系统', time: '2024-05-16 09:30:00', remark: '订单创建' },
              { step: 1, operator: '李师傅', time: '2024-05-16 09:45:00', remark: '选竹完成' },
              { step: 2, operator: '李师傅', time: '2024-05-16 10:20:00', remark: '锯切完成' },
              { step: 3, operator: '王师傅', time: '2024-05-16 11:00:00', remark: '车圆完成' }
            ]
          },
          {
            orderNo: 'BD20240516002',
            customerName: '李四',
            phone: '13800138002',
            bambooYear: '3年竹',
            height: 15,
            diameter: 8,
            pattern: '梅兰竹菊',
            craftType: '阳雕',
            currentStep: 5,
            remark: '',
            createTime: '2024-05-16 10:15:00',
            stepHistory: [
              { step: 0, operator: '系统', time: '2024-05-16 10:15:00', remark: '订单创建' },
              { step: 1, operator: '张师傅', time: '2024-05-16 10:30:00', remark: '选竹完成' },
              { step: 2, operator: '张师傅', time: '2024-05-16 11:00:00', remark: '锯切完成' },
              { step: 3, operator: '张师傅', time: '2024-05-16 14:00:00', remark: '车圆完成' },
              { step: 4, operator: '陈大师', time: '2024-05-16 16:30:00', remark: '雕刻完成' },
              { step: 5, operator: '王师傅', time: '2024-05-16 17:00:00', remark: '打磨完成' }
            ]
          },
          {
            orderNo: 'BD20240516003',
            customerName: '王五',
            phone: '13800138003',
            bambooYear: '8年以上老竹',
            height: 20,
            diameter: 12,
            pattern: '龙凤呈祥',
            craftType: '阴雕',
            currentStep: 7,
            remark: '送长辈的礼物，请精心制作',
            createTime: '2024-05-15 14:20:00',
            stepHistory: [
              { step: 0, operator: '系统', time: '2024-05-15 14:20:00', remark: '订单创建' },
              { step: 1, operator: '李师傅', time: '2024-05-15 15:00:00', remark: '选竹完成' },
              { step: 2, operator: '李师傅', time: '2024-05-15 16:00:00', remark: '锯切完成' },
              { step: 3, operator: '王师傅', time: '2024-05-15 17:30:00', remark: '车圆完成' },
              { step: 4, operator: '陈大师', time: '2024-05-16 10:00:00', remark: '雕刻完成' },
              { step: 5, operator: '王师傅', time: '2024-05-16 11:30:00', remark: '打磨完成' },
              { step: 6, operator: '张师傅', time: '2024-05-16 14:00:00', remark: '上漆完成' },
              { step: 7, operator: '管理员', time: '2024-05-16 15:00:00', remark: '订单完工' }
            ]
          }
        ]
      },
      methods: {
        handleTabClick(tab) {
          if (tab.name === 'admin') {
            this.loadOrders();
          }
        },
        submitOrder() {
          this.$refs.orderForm.validate((valid) => {
            if (valid) {
              this.submitting = true;
              setTimeout(() => {
                const now = this.formatDateTime(new Date());
                const newOrder = {
                  orderNo: 'BD' + this.generateOrderNo(),
                  customerName: this.orderForm.customerName,
                  phone: this.orderForm.phone,
                  bambooYear: this.orderForm.bambooYear,
                  height: this.orderForm.height,
                  diameter: this.orderForm.diameter,
                  pattern: this.orderForm.pattern,
                  craftType: this.orderForm.craftType,
                  currentStep: 0,
                  remark: this.orderForm.remark,
                  createTime: now,
                  stepHistory: [
                    { step: 0, operator: '客户', time: now, remark: '订单提交' }
                  ]
                };
                this.orders.unshift(newOrder);
                this.refreshOrderList();
                this.submitting = false;
                this.$message({
                  type: 'success',
                  message: '订单提交成功！我们将尽快为您制作。'
                });
                this.resetForm();
              }, 1000);
            } else {
              this.$message.error('请完善表单信息');
              return false;
            }
          });
        },
        refreshOrderList() {
          this.loading = true;
          setTimeout(() => {
            this.loading = false;
          }, 300);
        },
        resetForm() {
          this.$refs.orderForm.resetFields();
        },
        loadOrders() {
          this.loading = true;
          setTimeout(() => {
            this.loading = false;
          }, 500);
        },
        updateStep(row) {
          this.currentOrder = row;
          if (row.currentStep >= 7) {
            this.$message.warning('该订单已完工，无需继续推进');
            return;
          }
          const nextStep = row.currentStep + 1;
          this.$prompt(`确认将工序从【${this.stepLabels[row.currentStep]}】推进到【${this.stepLabels[nextStep]}】吗？`, '工序确认', {
            confirmButtonText: '确认推进',
            cancelButtonText: '取消',
            inputPlaceholder: '请输入操作人姓名（可选）',
            inputValue: this.currentOperator,
            type: 'info'
          }).then(({ value }) => {
            const operator = value || this.currentOperator;
            const now = this.formatDateTime(new Date());
            row.currentStep = nextStep;
            if (!row.stepHistory) {
              row.stepHistory = [];
            }
            row.stepHistory.push({
              step: nextStep,
              operator: operator,
              time: now,
              remark: `${this.stepLabels[nextStep]}完成`
            });
            this.$message.success(`【${operator}】已成功推进到：${this.stepLabels[nextStep]}`);
          }).catch(() => {});
        },
        viewStepHistory(row) {
          this.currentOrder = row;
          this.stepDialogVisible = true;
        },
        deleteOrder(row) {
          this.$confirm('确认删除该订单吗？', '提示', {
            confirmButtonText: '确定',
            cancelButtonText: '取消',
            type: 'warning'
          }).then(() => {
            const index = this.orders.indexOf(row);
            this.orders.splice(index, 1);
            this.$message.success('删除成功');
          }).catch(() => {});
        },
        generateOrderNo() {
          const now = new Date();
          const dateStr = now.getFullYear().toString() + 
            (now.getMonth() + 1).toString().padStart(2, '0') + 
            now.getDate().toString().padStart(2, '0');
          const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
          return dateStr + random;
        },
        formatDateTime(date) {
          const y = date.getFullYear();
          const m = (date.getMonth() + 1).toString().padStart(2, '0');
          const d = date.getDate().toString().padStart(2, '0');
          const h = date.getHours().toString().padStart(2, '0');
          const min = date.getMinutes().toString().padStart(2, '0');
          const s = date.getSeconds().toString().padStart(2, '0');
          return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }
      }
    });
  </script>
</body>
</html>
