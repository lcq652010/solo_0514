<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>传统瓷质茶盏定制系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    #app {
      min-height: 100vh;
    }
    .nav-bar {
      background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
      padding: 0 50px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }
    .nav-bar .el-menu {
      background: transparent;
      border-bottom: none;
    }
    .nav-bar .el-menu-item {
      color: #ecf0f1;
    }
    .nav-bar .el-menu-item:hover,
    .nav-bar .el-menu-item.is-active {
      color: #3498db;
      border-bottom: 2px solid #3498db;
      background: rgba(255, 255, 255, 0.1);
    }
    .page-container {
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .page-title {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
    }
    .form-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }
    .order-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .order-card:hover {
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }
    .status-step {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
    }
    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .step-item::before {
      position: absolute;
      content: '';
      height: 3px;
      width: 100%;
      background: #e4e7ed;
      top: 18px;
      left: 50%;
      z-index: 0;
    }
    .step-item:last-child::before {
      display: none;
    }
    .step-item.completed::before,
    .step-item.active::before {
      background: #67c23a;
    }
    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #e4e7ed;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      font-size: 14px;
      color: #909399;
      font-weight: 600;
    }
    .step-item.completed .step-circle,
    .step-item.active .step-circle {
      background: #67c23a;
      color: white;
    }
    .step-label {
      margin-top: 8px;
      font-size: 12px;
      color: #909399;
      text-align: center;
    }
    .step-item.completed .step-label,
    .step-item.active .step-label {
      color: #67c23a;
      font-weight: 600;
    }
    .order-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px;
    }
    .info-item {
      padding: 10px;
      background: #f5f7fa;
      border-radius: 8px;
    }
    .info-label {
      font-size: 12px;
      color: #909399;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 14px;
      color: #303133;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="nav-bar">
      <el-menu 
        :default-active="activeRoute" 
        mode="horizontal" 
        @select="handleRouteChange"
        router
      >
        <el-menu-item index="order">客户下单</el-menu-item>
        <el-menu-item index="admin">管理员订单管理</el-menu-item>
      </el-menu>
    </div>
    
    <div class="page-container">
      <order-form v-if="activeRoute === 'order'" @order-submitted="handleOrderSubmitted"></order-form>
      <admin-panel v-else :orders="orders" :loading="orderListLoading"></admin-panel>
    </div>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
  <script src="app.js"></script>
</body>
</html>
