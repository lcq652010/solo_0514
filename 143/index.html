<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>传统景泰蓝手镯定制系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
      background-color: #f5f7fa;
    }

    #app {
      min-height: 100vh;
    }

    .el-menu {
      border-bottom: none;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      padding: 0 20px;
    }

    .nav-items {
      display: flex;
    }

    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 0;
    }

    .el-menu-item {
      border-bottom: none !important;
    }

    .el-menu-item:hover {
      background-color: rgba(255, 255, 255, 0.1) !important;
    }

    .order-form-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-header h1 {
      color: #8B4513;
      font-size: 32px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .subtitle {
      color: #666;
      font-size: 16px;
    }

    .form-card {
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
    }

    .divider-title {
      color: #8B4513;
      font-weight: 600;
      font-size: 16px;
    }

    .submit-btn {
      background: linear-gradient(135deg, #8B4513, #D2691E);
      border: none;
    }

    .order-admin-container {
      padding: 20px;
    }

    .admin-card {
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
    }

    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .order-stats {
      color: #666;
      font-size: 14px;
    }

    .highlight-row {
      background-color: #fff3cd !important;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .new-order-row {
      border-left: 4px solid #ff6b6b !important;
      background-color: #fff5f5 !important;
      position: relative;
    }

    .new-order-row td:first-child::before {
      content: '新';
      display: inline-block;
      background: #ff6b6b;
      color: white;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-right: 5px;
      font-weight: bold;
    }

    @keyframes pulse {
      0%, 100% {
        background-color: #fff3cd;
      }
      50% {
        background-color: #ffeeba;
      }
    }

    .status-timeline {
      padding: 10px 0;
    }

    .timeline-item {
      padding: 10px 0;
      border-left: 2px solid #e4e7ed;
      padding-left: 20px;
      margin-left: 10px;
      position: relative;
    }

    .timeline-item::before {
      content: '';
      width: 10px;
      height: 10px;
      background: #409eff;
      border-radius: 50%;
      position: absolute;
      left: -6px;
      top: 15px;
    }

    .timeline-item:last-child {
      border-left: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <el-menu :default-active="activeIndex" mode="horizontal" background-color="#8B4513" text-color="#fff" active-text-color="#ffd04b" router>
      <div class="nav-container">
        <div class="logo">
          <span>景泰蓝定制</span>
        </div>
        <div class="nav-items">
          <el-menu-item index="/">
            <i class="el-icon-edit-outline"></i>
            <span>客户下单</span>
          </el-menu-item>
          <el-menu-item index="/admin">
            <i class="el-icon-s-order"></i>
            <span>订单管理</span>
          </el-menu-item>
        </div>
      </div>
    </el-menu>
    <main class="main-content">
      <router-view></router-view>
    </main>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
  <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.js"></script>
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>

  <script>
    const statusList = ['制胎', '掐丝', '点蓝', '烧蓝', '磨光', '镀金', '质检', '完工'];
    const eventBus = new Vue();

    const OrderForm = {
      template: `
        <div class="order-form-container">
          <div class="page-header">
            <h1>传统景泰蓝手镯定制</h1>
            <p class="subtitle">匠心独运，传世精品</p>
          </div>

          <el-card class="form-card">
            <el-form :model="orderForm" :rules="rules" ref="orderForm" label-width="120px">
              <el-divider content-position="left">
                <span class="divider-title">基本信息</span>
              </el-divider>

              <el-form-item label="客户姓名" prop="customerName">
                <el-input v-model="orderForm.customerName" placeholder="请输入您的姓名" clearable></el-input>
              </el-form-item>

              <el-form-item label="联系电话" prop="phone">
                <el-input v-model="orderForm.phone" placeholder="请输入联系电话" clearable></el-input>
              </el-form-item>

              <el-divider content-position="left">
                <span class="divider-title">胎体规格</span>
              </el-divider>

              <el-form-item label="胎体材质" prop="material">
                <el-select v-model="orderForm.material" placeholder="请选择胎体材质" style="width: 100%">
                  <el-option label="紫铜" value="紫铜"></el-option>
                  <el-option label="黄铜" value="黄铜"></el-option>
                  <el-option label="纯银" value="纯银"></el-option>
                  <el-option label="金胎" value="金胎"></el-option>
                </el-select>
              </el-form-item>

              <el-row :gutter="20">
                <el-col :span="12">
                  <el-form-item label="手镯内径(mm)" prop="innerDiameter">
                    <el-input-number v-model="orderForm.innerDiameter" :min="50" :max="70" :step="0.5" style="width: 100%"></el-input-number>
                  </el-form-item>
                </el-col>
                <el-col :span="12">
                  <el-form-item label="圈口粗细(mm)" prop="thickness">
                    <el-input-number v-model="orderForm.thickness" :min="4" :max="15" :step="0.5" style="width: 100%"></el-input-number>
                  </el-form-item>
                </el-col>
              </el-row>

              <el-divider content-position="left">
                <span class="divider-title">珐琅工艺</span>
              </el-divider>

              <el-form-item label="珐琅釉色" prop="enamelColors">
                <el-checkbox-group v-model="orderForm.enamelColors">
                  <el-checkbox label="宝石蓝">宝石蓝</el-checkbox>
                  <el-checkbox label="翡翠绿">翡翠绿</el-checkbox>
                  <el-checkbox label="珊瑚红">珊瑚红</el-checkbox>
                  <el-checkbox label="明黄">明黄</el-checkbox>
                  <el-checkbox label="紫罗兰">紫罗兰</el-checkbox>
                  <el-checkbox label="胭脂粉">胭脂粉</el-checkbox>
                  <el-checkbox label="月白">月白</el-checkbox>
                  <el-checkbox label="墨黑">墨黑</el-checkbox>
                </el-checkbox-group>
              </el-form-item>

              <el-form-item label="掐丝纹样" prop="pattern">
                <el-radio-group v-model="orderForm.pattern">
                  <el-radio label="祥云纹">祥云纹</el-radio>
                  <el-radio label="缠枝莲">缠枝莲</el-radio>
                  <el-radio label="龙凤纹">龙凤纹</el-radio>
                  <el-radio label="牡丹纹">牡丹纹</el-radio>
                  <el-radio label="山水纹">山水纹</el-radio>
                  <el-radio label="百鸟朝凤">百鸟朝凤</el-radio>
                </el-radio-group>
              </el-form-item>

              <el-form-item label="备注说明">
                <el-input type="textarea" v-model="orderForm.remark" :rows="4" placeholder="请输入其他特殊要求..."></el-input>
              </el-form-item>

              <el-form-item>
                <el-button type="primary" size="large" @click="submitOrder" :loading="submitting" class="submit-btn">
                  提交定制订单
                </el-button>
                <el-button size="large" @click="resetForm">重置</el-button>
              </el-form-item>
            </el-form>
          </el-card>
        </div>
      `,
      data() {
        return {
          submitting: false,
          orderForm: {
            customerName: '',
            phone: '',
            material: '',
            innerDiameter: 58,
            thickness: 8,
            enamelColors: [],
            pattern: '',
            remark: ''
          },
          rules: {
            customerName: [
              { required: true, message: '请输入客户姓名', trigger: 'blur' }
            ],
            phone: [
              { required: true, message: '请输入联系电话', trigger: 'blur' },
              { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
            ],
            material: [
              { required: true, message: '请选择胎体材质', trigger: 'change' }
            ],
            innerDiameter: [
              { required: true, message: '请输入手镯内径', trigger: 'blur' },
              { type: 'number', min: 50, max: 70, message: '手镯内径应在 50-70mm 之间', trigger: 'blur' }
            ],
            thickness: [
              { required: true, message: '请输入圈口粗细', trigger: 'blur' },
              { type: 'number', min: 4, max: 15, message: '圈口粗细应在 4-15mm 之间', trigger: 'blur' }
            ],
            enamelColors: [
              { validator: (rule, value, callback) => {
                if (!value || value.length === 0) {
                  callback(new Error('请至少选择一种珐琅釉色'));
                } else {
                  callback();
                }
              }, trigger: 'change' }
            ],
            pattern: [
              { required: true, message: '请选择掐丝纹样', trigger: 'change' }
            ]
          }
        }
      },
      methods: {
        submitOrder() {
          this.$refs.orderForm.validate((valid) => {
            if (valid) {
              this.submitting = true;
              setTimeout(() => {
                const newOrderId = 'ORD' + Date.now();
                const order = {
                  id: newOrderId,
                  ...this.orderForm,
                  status: 0,
                  statusText: '制胎',
                  createTime: new Date().toLocaleString(),
                  isNew: true,
                  statusHistory: [
                    {
                      status: 0,
                      statusText: '制胎',
                      operator: '系统',
                      operateTime: new Date().toLocaleString(),
                      remark: '订单创建'
                    }
                  ]
                };
                const orders = JSON.parse(localStorage.getItem('cloisonneOrders') || '[]');
                orders.unshift(order);
                localStorage.setItem('cloisonneOrders', JSON.stringify(orders));
                eventBus.$emit('orderSubmitted', newOrderId);
                this.$message.success('订单提交成功！');
                this.submitting = false;
                this.resetForm();
              }, 1000);
            }
          });
        },
        resetForm() {
          this.$refs.orderForm.resetFields();
          this.orderForm.enamelColors = [];
        }
      }
    };

    const OrderAdmin = {
      template: `
        <div class="order-admin-container">
          <div class="page-header">
            <h1>订单管理中心</h1>
            <p class="subtitle">景泰蓝手镯定制订单管理系统</p>
          </div>

          <el-card class="admin-card">
            <div class="table-toolbar">
              <el-button type="primary" @click="refreshOrders" icon="el-icon-refresh">
                刷新订单
              </el-button>
              <span class="order-stats">
                共 <strong>{{ orders.length }}</strong> 条订单
              </span>
            </div>

            <el-table :data="orders" border stripe style="width: 100%" v-loading="loading" ref="orderTable" row-key="id" :row-class-name="getRowClassName">
              <el-table-column prop="id" label="订单编号" width="150" sortable>
              </el-table-column>

              <el-table-column label="客户信息" width="200">
                <template slot-scope="scope">
                  <div><strong>{{ scope.row.customerName }}</strong></div>
                  <div style="color: #666; font-size: 12px;">{{ scope.row.phone }}</div>
                </template>
              </el-table-column>

              <el-table-column label="产品规格" min-width="220">
                <template slot-scope="scope">
                  <el-tag size="mini" type="info">{{ scope.row.material }}</el-tag>
                  <div style="margin-top: 5px; font-size: 12px;">
                    内径: {{ scope.row.innerDiameter }}mm · 粗细: {{ scope.row.thickness }}mm
                  </div>
                </template>
              </el-table-column>

              <el-table-column label="工艺详情" min-width="200">
                <template slot-scope="scope">
                  <div>
                    <span style="color: #8B4513; font-weight: 500;">{{ scope.row.pattern }}</span>
                  </div>
                  <div style="font-size: 12px; color: #666; margin-top: 3px;">
                    {{ scope.row.enamelColors.join('、') }}
                  </div>
                </template>
              </el-table-column>

              <el-table-column prop="createTime" label="下单时间" width="180" sortable>
              </el-table-column>

              <el-table-column label="生产进度" width="280">
                <template slot-scope="scope">
                  <el-steps :active="scope.row.status" finish-status="success" size="small">
                    <el-step title="制胎"></el-step>
                    <el-step title="掐丝"></el-step>
                    <el-step title="点蓝"></el-step>
                    <el-step title="烧蓝"></el-step>
                    <el-step title="磨光"></el-step>
                    <el-step title="镀金"></el-step>
                    <el-step title="质检"></el-step>
                    <el-step title="完工"></el-step>
                  </el-steps>
                </template>
              </el-table-column>

              <el-table-column label="当前状态" width="100" align="center">
                <template slot-scope="scope">
                  <el-tag :type="getStatusType(scope.row.status)">
                    {{ scope.row.statusText }}
                  </el-tag>
                </template>
              </el-table-column>

              <el-table-column label="操作" width="200" fixed="right">
                <template slot-scope="scope">
                  <el-button size="mini" type="primary" @click="viewDetail(scope.row)" icon="el-icon-view">
                    详情
                  </el-button>
                  <el-dropdown @command="(status) => updateStatus(scope.row, status)" v-if="scope.row.status < 8">
                    <el-button size="mini" type="success" icon="el-icon-s-promotion">
                      更新状态<i class="el-icon-arrow-down el-icon--right"></i>
                    </el-button>
                    <el-dropdown-menu slot="dropdown">
                      <el-dropdown-item :command="scope.row.status + 1">{{ statusList[scope.row.status] }}完成</el-dropdown-item>
                    </el-dropdown-menu>
                  </el-dropdown>
                </template>
              </el-table-column>
            </el-table>

            <el-empty v-if="orders.length === 0" description="暂无订单数据"></el-empty>
          </el-card>

          <el-dialog title="订单详情" :visible.sync="detailVisible" width="700px">
            <el-descriptions :column="2" border v-if="currentOrder">
              <el-descriptions-item label="订单编号" :span="2">
                {{ currentOrder.id }}
              </el-descriptions-item>
              <el-descriptions-item label="客户姓名">
                {{ currentOrder.customerName }}
              </el-descriptions-item>
              <el-descriptions-item label="联系电话">
                {{ currentOrder.phone }}
              </el-descriptions-item>
              <el-descriptions-item label="胎体材质">
                {{ currentOrder.material }}
              </el-descriptions-item>
              <el-descriptions-item label="手镯规格">
                {{ currentOrder.innerDiameter }}mm / {{ currentOrder.thickness }}mm
              </el-descriptions-item>
              <el-descriptions-item label="珐琅釉色" :span="2">
                {{ currentOrder.enamelColors ? currentOrder.enamelColors.join('、') : '-' }}
              </el-descriptions-item>
              <el-descriptions-item label="掐丝纹样" :span="2">
                {{ currentOrder.pattern }}
              </el-descriptions-item>
              <el-descriptions-item label="下单时间" :span="2">
                {{ currentOrder.createTime }}
              </el-descriptions-item>
              <el-descriptions-item label="备注说明" :span="2">
                {{ currentOrder.remark || '无' }}
              </el-descriptions-item>
            </el-descriptions>
            
            <div style="margin-top: 20px;" v-if="currentOrder && currentOrder.statusHistory">
              <h4 style="margin-bottom: 10px; color: #606266;">
                <i class="el-icon-time"></i> 状态变更历史
              </h4>
              <div class="status-timeline">
                <div v-for="(item, index) in currentOrder.statusHistory" :key="index" class="timeline-item">
                  <div style="font-weight: 500; color: #303133;">
                    <el-tag size="mini" type="info">{{ item.statusText }}</el-tag>
                  </div>
                  <div style="margin-top: 5px; font-size: 13px; color: #606266;">
                    <span>操作人: {{ item.operator }}</span>
                    <span style="margin-left: 15px;">时间: {{ item.operateTime }}</span>
                  </div>
                  <div style="margin-top: 3px; font-size: 12px; color: #909399;">
                    备注: {{ item.remark }}
                  </div>
                </div>
              </div>
            </div>
            
            <span slot="footer" class="dialog-footer">
              <el-button @click="detailVisible = false">关闭</el-button>
            </span>
          </el-dialog>
        </div>
      `,
      data() {
        return {
          loading: false,
          orders: [],
          detailVisible: false,
          currentOrder: null,
          highlightOrderId: null
        }
      },
      mounted() {
        this.loadOrders();
        eventBus.$on('orderSubmitted', (orderId) => {
          this.refreshAndScroll(orderId);
        });
      },
      methods: {
        loadOrders() {
          this.loading = true;
          setTimeout(() => {
            this.orders = JSON.parse(localStorage.getItem('cloisonneOrders') || '[]');
            this.loading = false;
          }, 500);
        },
        refreshOrders() {
          this.loadOrders();
          this.$message.success('订单已刷新');
        },
        refreshAndScroll(orderId) {
          this.loadOrders();
          this.highlightOrderId = orderId;
          this.$nextTick(() => {
            const table = this.$refs.orderTable;
            if (table) {
              const row = table.$el.querySelector('.highlight-row');
              if (row) {
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                  this.highlightOrderId = null;
                }, 3000);
              }
            }
          });
        },
        getRowClassName({ row }) {
          if (row.id === this.highlightOrderId) return 'highlight-row';
          if (row.isNew) return 'new-order-row';
          return '';
        },
        getStatusType(status) {
          if (status >= 8) return 'success';
          if (status >= 6) return 'warning';
          return 'primary';
        },
        updateStatus(order, newStatus) {
          this.$prompt(`请输入操作人姓名后将订单 ${order.id} 更新为「${statusList[newStatus - 1]}」状态`, '更新状态', {
            confirmButtonText: '确定',
            cancelButtonText: '取消',
            inputPattern: /\S+/,
            inputErrorMessage: '操作人姓名不能为空'
          }).then(({ value: operator }) => {
            order.status = newStatus;
            order.statusText = statusList[newStatus - 1];
            order.isNew = false;
            if (!order.statusHistory) {
              order.statusHistory = [];
            }
            order.statusHistory.push({
              status: newStatus,
              statusText: statusList[newStatus - 1],
              operator: operator,
              operateTime: new Date().toLocaleString(),
              remark: '状态更新'
            });
            localStorage.setItem('cloisonneOrders', JSON.stringify(this.orders));
            this.$message.success('状态更新成功');
          }).catch(() => {});
        },
        viewDetail(order) {
          this.currentOrder = order;
          this.detailVisible = true;
        }
      }
    };

    const routes = [
      { path: '/', component: OrderForm },
      { path: '/admin', component: OrderAdmin }
    ];

    const router = new VueRouter({
      mode: 'hash',
      routes
    });

    new Vue({
      router,
      data: {
        activeIndex: '/'
      },
      watch: {
        $route(to) {
          this.activeIndex = to.path;
        }
      },
      mounted() {
        this.activeIndex = this.$route.path;
      }
    }).$mount('#app');
  </script>
</body>
</html>
