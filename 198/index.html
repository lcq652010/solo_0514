<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体检报告自助打印终端运维管理系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      padding: 24px 32px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #fff;
      box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .search-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    .search-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-item label {
      font-size: 14px;
      color: #606266;
      white-space: nowrap;
    }
    .table-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .table-title {
      font-size: 16px;
      font-weight: 600;
      color: #303133;
    }
    .status-online {
      color: #67c23a;
      font-weight: 500;
    }
    .status-offline {
      color: #f56c6c;
      font-weight: 500;
    }
    .status-fault {
      color: #e6a23c;
      font-weight: 500;
    }
    .status-maintenance {
      color: #909399;
      font-weight: 500;
    }
    .module-normal {
      color: #67c23a;
      font-weight: 500;
    }
    .module-warning {
      color: #e6a23c;
      font-weight: 500;
    }
    .module-error {
      color: #f56c6c;
      font-weight: 500;
    }
    .pagination-container {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .stat-icon.online {
      background: #f0f9eb;
      color: #67c23a;
    }
    .stat-icon.offline {
      background: #fef0f0;
      color: #f56c6c;
    }
    .stat-icon.fault {
      background: #fdf6ec;
      color: #e6a23c;
    }
    .stat-icon.maintenance {
      background: #f4f4f5;
      color: #909399;
    }
    .stat-info h3 {
      font-size: 24px;
      font-weight: 600;
      color: #303133;
      margin-bottom: 4px;
    }
    .stat-info p {
      font-size: 13px;
      color: #909399;
    }
    .row-fault {
      background: #fef0f0 !important;
    }
    .row-offline {
      background: #fdf6ec !important;
    }
    .row-maintenance {
      background: #f4f4f5 !important;
    }
    .el-table .row-fault:hover > td {
      background: #fde2e2 !important;
    }
    .el-table .row-offline:hover > td {
      background: #faecd8 !important;
    }
    .el-table .row-maintenance:hover > td {
      background: #e9e9eb !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-container">
      <div class="header">
        <h1>🖨️ 体检报告自助打印终端运维管理系统</h1>
        <p>实时监控设备运行状态，高效处理故障工单</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon online">●</div>
          <div class="stat-info">
            <h3>{{ stats.online }}</h3>
            <p>在线设备</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon offline">●</div>
          <div class="stat-info">
            <h3>{{ stats.offline }}</h3>
            <p>离线设备</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon fault">●</div>
          <div class="stat-info">
            <h3>{{ stats.fault }}</h3>
            <p>故障设备</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon maintenance">●</div>
          <div class="stat-info">
            <h3>{{ stats.maintenance }}</h3>
            <p>维护中设备</p>
          </div>
        </div>
      </div>

      <div class="search-card">
        <div class="search-form">
          <div class="search-item">
            <label>设备编号：</label>
            <el-input 
              v-model="searchForm.deviceCode" 
              placeholder="请输入设备编号" 
              clearable
              @keyup.enter.native="handleSearch"
              @input="handleSearch"
              style="width: 200px;">
            </el-input>
          </div>
          <div class="search-item">
            <label>机构名称：</label>
            <el-input 
              v-model="searchForm.organization" 
              placeholder="请输入体检中心名称" 
              clearable
              @keyup.enter.native="handleSearch"
              @input="handleSearch"
              style="width: 200px;">
            </el-input>
          </div>
          <div class="search-item">
            <label>运行状态：</label>
            <el-select 
              v-model="searchForm.status" 
              placeholder="全部状态" 
              clearable
              @change="handleSearch"
              style="width: 140px;">
              <el-option label="在线" value="online"></el-option>
              <el-option label="离线" value="offline"></el-option>
              <el-option label="故障" value="fault"></el-option>
              <el-option label="维护中" value="maintenance"></el-option>
            </el-select>
          </div>
          <el-button type="primary" icon="el-icon-search" @click="handleSearch">搜索</el-button>
          <el-button icon="el-icon-refresh" @click="handleReset">重置</el-button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <span class="table-title">设备列表</span>
          <el-button type="danger" icon="el-icon-warning" @click="openReportDialog">故障上报</el-button>
        </div>

        <el-table 
          :data="paginatedData" 
          border 
          style="width: 100%"
          v-loading="loading"
          :row-class-name="tableRowClassName">
          <el-table-column type="selection" width="55" align="center"></el-table-column>
          <el-table-column prop="deviceCode" label="设备编号" width="140" align="center"></el-table-column>
          <el-table-column prop="organization" label="体检中心" min-width="180"></el-table-column>
          <el-table-column prop="floor" label="楼层位置" width="120" align="center"></el-table-column>
          <el-table-column label="运行状态" width="100" align="center">
            <template slot-scope="scope">
              <span :class="getStatusClass(scope.row.status)">
                {{ getStatusText(scope.row.status) }}
              </span>
            </template>
          </el-table-column>
          <el-table-column label="身份识别" width="100" align="center">
            <template slot-scope="scope">
              <span :class="getModuleStatusClass(scope.row.idModule)">
                {{ getModuleStatusText(scope.row.idModule) }}
              </span>
            </template>
          </el-table-column>
          <el-table-column label="报告打印" width="100" align="center">
            <template slot-scope="scope">
              <span :class="getModuleStatusClass(scope.row.printModule)">
                {{ getModuleStatusText(scope.row.printModule) }}
              </span>
            </template>
          </el-table-column>
          <el-table-column label="数据加密" width="100" align="center">
            <template slot-scope="scope">
              <span :class="getModuleStatusClass(scope.row.encryptModule)">
                {{ getModuleStatusText(scope.row.encryptModule) }}
              </span>
            </template>
          </el-table-column>
          <el-table-column prop="lastHeartbeat" label="最后心跳" width="170" align="center"></el-table-column>
          <el-table-column prop="installDate" label="安装日期" width="120" align="center"></el-table-column>
          <el-table-column label="操作" width="140" align="center">
            <template slot-scope="scope">
              <el-button 
                type="text" 
                size="small" 
                icon="el-icon-warning"
                @click="quickReport(scope.row)">
                上报故障
              </el-button>
            </template>
          </el-table-column>
        </el-table>

        <div class="pagination-container">
          <el-pagination
            @size-change="handleSizeChange"
            @current-change="handleCurrentChange"
            :current-page="pagination.currentPage"
            :page-sizes="[5, 10, 20, 50]"
            :page-size="pagination.pageSize"
            layout="total, sizes, prev, pager, next, jumper"
            :total="pagination.total">
          </el-pagination>
        </div>
      </div>

      <el-dialog 
        title="故障上报" 
        :visible.sync="reportDialogVisible" 
        width="500px"
        @close="resetReportForm">
        <el-form :model="reportForm" :rules="reportRules" ref="reportForm" label-width="100px">
          <el-form-item label="工单编号">
            <el-input v-model="reportForm.orderNo" disabled></el-input>
          </el-form-item>
          <el-form-item label="设备编号" prop="deviceCode">
            <el-select 
              v-model="reportForm.deviceCode" 
              placeholder="请选择设备" 
              filterable
              style="width: 100%">
              <el-option 
                v-for="device in deviceList" 
                :key="device.deviceCode" 
                :label="device.deviceCode + ' - ' + device.organization" 
                :value="device.deviceCode">
              </el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="故障类型" prop="faultType">
            <el-select v-model="reportForm.faultType" placeholder="请选择故障类型" style="width: 100%">
              <el-option label="硬件故障" value="hardware"></el-option>
              <el-option label="软件故障" value="software"></el-option>
              <el-option label="网络故障" value="network"></el-option>
              <el-option label="卡纸故障" value="paper_jam"></el-option>
              <el-option label="缺纸/缺墨" value="supply"></el-option>
              <el-option label="其他故障" value="other"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="异常描述" prop="description">
            <el-input 
              type="textarea" 
              v-model="reportForm.description" 
              :rows="4" 
              placeholder="请详细描述异常情况...">
            </el-input>
          </el-form-item>
          <el-form-item label="上报人" prop="reporter">
            <el-input v-model="reportForm.reporter" placeholder="请输入上报人姓名"></el-input>
          </el-form-item>
        </el-form>
        <span slot="footer" class="dialog-footer">
          <el-button @click="reportDialogVisible = false">取 消</el-button>
          <el-button type="primary" @click="submitReport">提 交</el-button>
        </span>
      </el-dialog>
    </div>
  </div>

  <script src="https://unpkg.com/vue@2.6.14/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>
  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          loading: false,
          searchForm: {
            deviceCode: '',
            organization: '',
            status: ''
          },
          pagination: {
            currentPage: 1,
            pageSize: 10,
            total: 0
          },
          deviceList: [],
          filteredList: [],
          reportDialogVisible: false,
          reportForm: {
            orderNo: '',
            deviceCode: '',
            faultType: '',
            description: '',
            reporter: ''
          },
          reportRules: {
            deviceCode: [
              { required: true, message: '请选择设备', trigger: 'change' }
            ],
            faultType: [
              { required: true, message: '请选择故障类型', trigger: 'change' }
            ],
            description: [
              { required: true, message: '请输入异常描述', trigger: 'blur' },
              { min: 10, message: '描述至少10个字符', trigger: 'blur' },
              { max: 500, message: '描述不能超过500个字符', trigger: 'blur' }
            ],
            reporter: [
              { required: true, message: '请输入上报人姓名', trigger: 'blur' },
              { min: 2, message: '姓名至少2个字符', trigger: 'blur' }
            ]
          },
          workOrderCount: 0
        }
      },
      computed: {
        paginatedData() {
          const start = (this.pagination.currentPage - 1) * this.pagination.pageSize;
          const end = start + this.pagination.pageSize;
          return this.filteredList.slice(start, end);
        },
        stats() {
          return {
            online: this.deviceList.filter(d => d.status === 'online').length,
            offline: this.deviceList.filter(d => d.status === 'offline').length,
            fault: this.deviceList.filter(d => d.status === 'fault').length,
            maintenance: this.deviceList.filter(d => d.status === 'maintenance').length
          };
        }
      },
      created() {
        this.generateMockData();
        this.handleSearch();
      },
      methods: {
        generateMockData() {
          const organizations = [
            '北京协和医院体检中心',
            '上海瑞金医院体检中心',
            '广州中山医院体检中心',
            '深圳人民医院体检中心',
            '杭州第一人民医院体检中心',
            '南京鼓楼医院体检中心',
            '成都华西医院体检中心',
            '武汉同济医院体检中心',
            '西安西京医院体检中心',
            '天津医科大学总医院体检中心'
          ];
          const floors = ['1F', '2F', '3F', '4F', '5F', 'B1'];
          const statuses = ['online', 'online', 'online', 'online', 'online', 'offline', 'fault', 'maintenance'];

          for (let i = 1; i <= 36; i++) {
            const orgIndex = Math.floor(Math.random() * organizations.length);
            const org = organizations[orgIndex];
            const status = statuses[Math.floor(Math.random() * statuses.length)];
            const now = new Date();
            const lastHeartbeat = status === 'offline' 
              ? this.formatDate(new Date(now - Math.random() * 86400000 * 3))
              : this.formatDate(new Date(now - Math.random() * 3600000));
            
            const moduleStatuses = ['normal', 'normal', 'normal', 'normal', 'warning', 'error'];
            this.deviceList.push({
              deviceCode: 'PRT' + String(i).padStart(4, '0'),
              organization: org,
              floor: floors[Math.floor(Math.random() * floors.length)],
              status: status,
              lastHeartbeat: lastHeartbeat,
              installDate: this.formatDate(new Date(2023 + Math.floor(Math.random() * 2), Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1)),
              idModule: status === 'online' ? moduleStatuses[Math.floor(Math.random() * moduleStatuses.length)] : 'error',
              printModule: status === 'online' ? moduleStatuses[Math.floor(Math.random() * moduleStatuses.length)] : 'error',
              encryptModule: status === 'online' ? moduleStatuses[Math.floor(Math.random() * moduleStatuses.length)] : 'error'
            });
          }
        },
        formatDate(date) {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const d = String(date.getDate()).padStart(2, '0');
          const h = String(date.getHours()).padStart(2, '0');
          const min = String(date.getMinutes()).padStart(2, '0');
          const s = String(date.getSeconds()).padStart(2, '0');
          return `${y}-${m}-${d} ${h}:${min}:${s}`;
        },
        getStatusClass(status) {
          const classMap = {
            online: 'status-online',
            offline: 'status-offline',
            fault: 'status-fault',
            maintenance: 'status-maintenance'
          };
          return classMap[status] || '';
        },
        getStatusText(status) {
          const textMap = {
            online: '在线',
            offline: '离线',
            fault: '故障',
            maintenance: '维护中'
          };
          return textMap[status] || status;
        },
        tableRowClassName({ row, rowIndex }) {
          if (row.status === 'fault') {
            return 'row-fault';
          } else if (row.status === 'offline') {
            return 'row-offline';
          } else if (row.status === 'maintenance') {
            return 'row-maintenance';
          }
          return '';
        },
        getModuleStatusClass(status) {
          const classMap = {
            normal: 'module-normal',
            warning: 'module-warning',
            error: 'module-error'
          };
          return classMap[status] || 'module-error';
        },
        getModuleStatusText(status) {
          const textMap = {
            normal: '正常',
            warning: '警告',
            error: '异常'
          };
          return textMap[status] || '异常';
        },
        handleSearch() {
          this.loading = true;
          setTimeout(() => {
            this.filteredList = this.deviceList.filter(item => {
              const matchDevice = !this.searchForm.deviceCode || 
                item.deviceCode.toLowerCase().includes(this.searchForm.deviceCode.toLowerCase());
              const matchOrg = !this.searchForm.organization || 
                item.organization.toLowerCase().includes(this.searchForm.organization.toLowerCase());
              const matchStatus = !this.searchForm.status || item.status === this.searchForm.status;
              return matchDevice && matchOrg && matchStatus;
            });
            this.pagination.total = this.filteredList.length;
            this.pagination.currentPage = 1;
            this.loading = false;
          }, 300);
        },
        handleReset() {
          this.searchForm.deviceCode = '';
          this.searchForm.organization = '';
          this.searchForm.status = '';
          this.handleSearch();
        },
        handleSizeChange(val) {
          this.pagination.pageSize = val;
          this.pagination.currentPage = 1;
        },
        handleCurrentChange(val) {
          this.pagination.currentPage = val;
        },
        generateOrderNo() {
          this.workOrderCount++;
          const now = new Date();
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, '0');
          const d = String(now.getDate()).padStart(2, '0');
          const seq = String(this.workOrderCount).padStart(4, '0');
          return `WO${y}${m}${d}${seq}`;
        },
        openReportDialog() {
          this.reportForm.orderNo = this.generateOrderNo();
          this.reportDialogVisible = true;
        },
        quickReport(row) {
          this.reportForm.orderNo = this.generateOrderNo();
          this.reportForm.deviceCode = row.deviceCode;
          this.reportDialogVisible = true;
        },
        resetReportForm() {
          this.$refs.reportForm && this.$refs.reportForm.resetFields();
          this.reportForm = {
            orderNo: '',
            deviceCode: '',
            faultType: '',
            description: '',
            reporter: ''
          };
        },
        submitReport() {
          if (!this.reportForm.deviceCode) {
            this.$message.warning('请先选择要上报故障的设备！');
            return;
          }
          if (!this.reportForm.faultType) {
            this.$message.warning('请选择故障类型！');
            return;
          }
          if (!this.reportForm.description || this.reportForm.description.trim().length < 10) {
            this.$message.warning('请详细描述故障情况（至少10个字符）！');
            return;
          }
          if (!this.reportForm.reporter || this.reportForm.reporter.trim().length < 2) {
            this.$message.warning('请输入上报人姓名（至少2个字符）！');
            return;
          }
          this.$refs.reportForm.validate((valid) => {
            if (valid) {
              this.$message.success(`工单 ${this.reportForm.orderNo} 提交成功！维修人员将尽快处理。`);
              this.reportDialogVisible = false;
              this.resetReportForm();
            } else {
              this.$message.error('请完善表单信息后再提交！');
            }
          });
        }
      }
    });
  </script>
</body>
</html>
