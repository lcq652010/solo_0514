<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教育局自助学籍证明打印终端运维管理系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.13/lib/theme-chalk/index.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background-color: #f5f7fa;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%);
      color: white;
      padding: 20px 0;
      text-align: center;
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
    }
    .header h1 {
      font-size: 24px;
      font-weight: 500;
    }
    .main-container {
      padding: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 500;
    }
    .search-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .status-normal {
      color: #67c23a;
      font-weight: 500;
    }
    .status-fault {
      color: #f56c6c;
      font-weight: 500;
    }
    .status-offline {
      color: #909399;
      font-weight: 500;
    }
    .status-maintenance {
      color: #e6a23c;
      font-weight: 500;
    }
    .pagination-wrapper {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .dialog-footer {
      text-align: right;
    }
    .el-table .row-fault {
      background-color: #fef0f0 !important;
    }
    .el-table .row-offline {
      background-color: #f4f4f5 !important;
    }
    .module-status {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .module-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }
    .module-name {
      color: #606266;
    }
    .module-value {
      font-weight: 500;
    }
    .filter-label {
      font-size: 14px;
      color: #606266;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>教育局自助学籍证明打印终端运维管理系统</h1>
    </div>
    <div class="main-container">
      <el-card>
        <div slot="header" class="card-header">
          <span>设备列表</span>
          <el-button type="primary" icon="el-icon-plus" @click="handleAddReport">
            故障上报
          </el-button>
        </div>

        <div class="search-bar">
          <span class="filter-label">设备状态：</span>
          <el-select
            v-model="searchForm.status"
            placeholder="请选择设备状态"
            style="width: 150px;"
            clearable
            @change="handleSearch"
          >
            <el-option label="全部" value=""></el-option>
            <el-option label="正常" value="正常"></el-option>
            <el-option label="故障" value="故障"></el-option>
            <el-option label="离线" value="离线"></el-option>
            <el-option label="维护中" value="维护中"></el-option>
          </el-select>
          <el-input
            v-model="searchForm.deviceCode"
            placeholder="请输入设备编号"
            prefix-icon="el-icon-search"
            style="width: 200px;"
            clearable
            @input="handleSearch"
          ></el-input>
          <el-input
            v-model="searchForm.servicePoint"
            placeholder="请输入服务点名称"
            prefix-icon="el-icon-search"
            style="width: 200px;"
            clearable
            @input="handleSearch"
          ></el-input>
          <el-button type="primary" @click="handleSearch">搜索</el-button>
          <el-button @click="handleReset">重置</el-button>
        </div>

        <el-table
          :data="tableData"
          border
          style="width: 100%;"
          v-loading="loading"
          :row-class-name="tableRowClassName"
        >
          <el-table-column
            prop="deviceCode"
            label="设备编号"
            width="120"
            align="center"
          ></el-table-column>
          <el-table-column
            prop="servicePoint"
            label="政务服务点"
            min-width="160"
            align="center"
          ></el-table-column>
          <el-table-column
            prop="location"
            label="安放位置"
            min-width="180"
            align="center"
          ></el-table-column>
          <el-table-column
            prop="status"
            label="设备状态"
            width="100"
            align="center"
          >
            <template slot-scope="scope">
              <span :class="getStatusClass(scope.row.status)">
                {{ scope.row.status }}
              </span>
            </template>
          </el-table-column>
          <el-table-column
            label="模块运行状态"
            min-width="350"
            align="left"
          >
            <template slot-scope="scope">
              <div class="module-status">
                <div class="module-item">
                  <span class="module-name">身份证读卡：</span>
                  <span class="module-value" :class="getStatusClass(scope.row.cardReaderStatus)">
                    {{ scope.row.cardReaderStatus }}
                  </span>
                </div>
                <div class="module-item">
                  <span class="module-name">证明打印：</span>
                  <span class="module-value" :class="getStatusClass(scope.row.printStatus)">
                    {{ scope.row.printStatus }}
                  </span>
                </div>
                <div class="module-item">
                  <span class="module-name">数据核验：</span>
                  <span class="module-value" :class="getStatusClass(scope.row.verifyStatus)">
                    {{ scope.row.verifyStatus }}
                  </span>
                </div>
              </div>
            </template>
          </el-table-column>
          <el-table-column
            label="操作"
            width="150"
            align="center"
          >
            <template slot-scope="scope">
              <el-button
                type="text"
                size="small"
                @click="handleReportFault(scope.row)"
                :disabled="scope.row.status === '正常'"
              >
                故障上报
              </el-button>
            </template>
          </el-table-column>
        </el-table>

        <div class="pagination-wrapper">
          <el-pagination
            @size-change="handleSizeChange"
            @current-change="handleCurrentChange"
            :current-page="pagination.currentPage"
            :page-sizes="[10, 20, 50, 100]"
            :page-size="pagination.pageSize"
            layout="total, sizes, prev, pager, next, jumper"
            :total="pagination.total"
          ></el-pagination>
        </div>
      </el-card>
    </div>

    <el-dialog
      title="故障上报"
      :visible.sync="dialogVisible"
      width="500px"
      @close="handleCloseDialog"
    >
      <el-form ref="form" :model="form" :rules="rules" label-width="100px">
        <el-form-item label="选择设备" prop="deviceId">
          <el-select
            v-model="form.deviceId"
            placeholder="请选择设备"
            style="width: 100%;"
            filterable
            @change="handleDeviceChange"
          >
            <el-option
              v-for="device in deviceOptions"
              :key="device.id"
              :label="`${device.deviceCode} - ${device.servicePoint}`"
              :value="device.id"
            ></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="设备编号" prop="deviceCode">
          <el-input
            v-model="form.deviceCode"
            placeholder="设备编号自动显示"
            disabled
          ></el-input>
        </el-form-item>
        <el-form-item label="政务服务点" prop="servicePoint">
          <el-input
            v-model="form.servicePoint"
            placeholder="服务点自动显示"
            disabled
          ></el-input>
        </el-form-item>
        <el-form-item label="故障描述" prop="faultDescription">
          <el-input
            type="textarea"
            v-model="form.faultDescription"
            placeholder="请详细描述故障情况..."
            :rows="4"
            maxlength="500"
            show-word-limit
          ></el-input>
        </el-form-item>
        <el-form-item label="上报人" prop="reporter">
          <el-input
            v-model="form.reporter"
            placeholder="请输入上报人姓名"
          ></el-input>
        </el-form-item>
        <el-form-item label="联系电话" prop="contactPhone">
          <el-input
            v-model="form.contactPhone"
            placeholder="请输入联系电话"
          ></el-input>
        </el-form-item>
      </el-form>
      <span slot="footer" class="dialog-footer">
        <el-button @click="handleCloseDialog">取 消</el-button>
        <el-button type="primary" @click="handleSubmitFault" :loading="submitting">提 交</el-button>
      </span>
    </el-dialog>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.13/lib/index.js"></script>
  <script>
    const statusList = ['正常', '故障', '离线', '维护中'];
    
    function generateRandomStatus() {
      return statusList[Math.floor(Math.random() * statusList.length)];
    }

    const mockDeviceList = [
      { id: 1, deviceCode: 'EDU-001', servicePoint: '市政务服务中心', location: '一楼大厅A区', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 2, deviceCode: 'EDU-002', servicePoint: '市政务服务中心', location: '一楼大厅B区', status: '故障', cardReaderStatus: '故障', printStatus: '正常', verifyStatus: '离线' },
      { id: 3, deviceCode: 'EDU-003', servicePoint: '区政务服务中心', location: '二楼服务窗口', status: '离线', cardReaderStatus: '离线', printStatus: '离线', verifyStatus: '离线' },
      { id: 4, deviceCode: 'EDU-004', servicePoint: '区政务服务中心', location: '三楼自助服务区', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 5, deviceCode: 'EDU-005', servicePoint: '街道便民服务中心', location: '入口处', status: '维护中', cardReaderStatus: '维护中', printStatus: '维护中', verifyStatus: '正常' },
      { id: 6, deviceCode: 'EDU-006', servicePoint: '街道便民服务中心', location: '办事大厅', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 7, deviceCode: 'EDU-007', servicePoint: '镇政务服务中心', location: '一楼大厅', status: '故障', cardReaderStatus: '正常', printStatus: '故障', verifyStatus: '正常' },
      { id: 8, deviceCode: 'EDU-008', servicePoint: '镇政务服务中心', location: '二楼', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 9, deviceCode: 'EDU-009', servicePoint: '开发区政务服务中心', location: 'A栋一楼', status: '离线', cardReaderStatus: '离线', printStatus: '离线', verifyStatus: '离线' },
      { id: 10, deviceCode: 'EDU-010', servicePoint: '开发区政务服务中心', location: 'B栋二楼', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 11, deviceCode: 'EDU-011', servicePoint: '高新区政务服务中心', location: '主楼大厅', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 12, deviceCode: 'EDU-012', servicePoint: '高新区政务服务中心', location: '副楼一楼', status: '故障', cardReaderStatus: '故障', printStatus: '故障', verifyStatus: '正常' },
      { id: 13, deviceCode: 'EDU-013', servicePoint: '新区政务服务中心', location: '服务大厅A区', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 14, deviceCode: 'EDU-014', servicePoint: '新区政务服务中心', location: '服务大厅B区', status: '维护中', cardReaderStatus: '维护中', printStatus: '维护中', verifyStatus: '维护中' },
      { id: 15, deviceCode: 'EDU-015', servicePoint: '园区政务服务中心', location: '一号楼大厅', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 16, deviceCode: 'EDU-016', servicePoint: '园区政务服务中心', location: '二号楼入口', status: '离线', cardReaderStatus: '离线', printStatus: '离线', verifyStatus: '离线' },
      { id: 17, deviceCode: 'EDU-017', servicePoint: '东区政务服务中心', location: '一楼自助区', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 18, deviceCode: 'EDU-018', servicePoint: '东区政务服务中心', location: '二楼办事区', status: '故障', cardReaderStatus: '正常', printStatus: '故障', verifyStatus: '故障' },
      { id: 19, deviceCode: 'EDU-019', servicePoint: '西区政务服务中心', location: '大厅入口处', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 20, deviceCode: 'EDU-020', servicePoint: '西区政务服务中心', location: '二楼南侧', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 21, deviceCode: 'EDU-021', servicePoint: '南区政务服务中心', location: '一楼大厅', status: '维护中', cardReaderStatus: '正常', printStatus: '维护中', verifyStatus: '正常' },
      { id: 22, deviceCode: 'EDU-022', servicePoint: '南区政务服务中心', location: '三楼', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 23, deviceCode: 'EDU-023', servicePoint: '北区政务服务中心', location: 'A区服务台旁', status: '离线', cardReaderStatus: '离线', printStatus: '离线', verifyStatus: '离线' },
      { id: 24, deviceCode: 'EDU-024', servicePoint: '北区政务服务中心', location: 'B区自助区', status: '正常', cardReaderStatus: '正常', printStatus: '正常', verifyStatus: '正常' },
      { id: 25, deviceCode: 'EDU-025', servicePoint: '中心区政务服务中心', location: '主楼一楼', status: '故障', cardReaderStatus: '故障', printStatus: '故障', verifyStatus: '故障' }
    ]

    function generateWorkOrderId() {
      const now = new Date()
      const year = now.getFullYear()
      const month = String(now.getMonth() + 1).padStart(2, '0')
      const day = String(now.getDate()).padStart(2, '0')
      const hours = String(now.getHours()).padStart(2, '0')
      const minutes = String(now.getMinutes()).padStart(2, '0')
      const seconds = String(now.getSeconds()).padStart(2, '0')
      const random = String(Math.floor(Math.random() * 1000)).padStart(3, '0')
      return `WO${year}${month}${day}${hours}${minutes}${seconds}${random}`
    }

    new Vue({
      el: '#app',
      data() {
        return {
          loading: false,
          dialogVisible: false,
          submitting: false,
          searchForm: {
            deviceCode: '',
            servicePoint: '',
            status: ''
          },
          allDeviceList: [],
          filteredList: [],
          pagination: {
            currentPage: 1,
            pageSize: 10,
            total: 0
          },
          form: {
            deviceId: '',
            deviceCode: '',
            servicePoint: '',
            faultDescription: '',
            reporter: '',
            contactPhone: ''
          },
          rules: {
            deviceId: [
              { required: true, message: '请选择故障设备', trigger: 'change' }
            ],
            faultDescription: [
              { required: true, message: '请输入故障描述', trigger: 'blur' },
              { min: 5, message: '故障描述不能少于5个字', trigger: 'blur' }
            ],
            reporter: [
              { required: true, message: '请输入上报人姓名', trigger: 'blur' }
            ],
            contactPhone: [
              { required: true, message: '请输入联系电话', trigger: 'blur' },
              { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
            ]
          }
        }
      },
      computed: {
        tableData() {
          const start = (this.pagination.currentPage - 1) * this.pagination.pageSize
          const end = start + this.pagination.pageSize
          return this.filteredList.slice(start, end)
        },
        deviceOptions() {
          return this.allDeviceList.filter(item => item.status !== '正常')
        }
      },
      watch: {
        'form.deviceId'(newVal) {
          this.handleDeviceChange(newVal)
        }
      },
      created() {
        this.fetchDeviceList()
      },
      methods: {
        fetchDeviceList() {
          this.loading = true
          setTimeout(() => {
            this.allDeviceList = [...mockDeviceList]
            this.applyFilters()
            this.loading = false
          }, 500)
        },
        getStatusClass(status) {
          const statusMap = {
            '正常': 'status-normal',
            '故障': 'status-fault',
            '离线': 'status-offline',
            '维护中': 'status-maintenance'
          }
          return statusMap[status] || ''
        },
        tableRowClassName({ row }) {
          if (row.status === '故障') {
            return 'row-fault'
          } else if (row.status === '离线') {
            return 'row-offline'
          }
          return ''
        },
        applyFilters() {
          this.filteredList = this.allDeviceList.filter(item => {
            const matchCode = !this.searchForm.deviceCode || 
              item.deviceCode.toLowerCase().includes(this.searchForm.deviceCode.toLowerCase())
            const matchPoint = !this.searchForm.servicePoint || 
              item.servicePoint.toLowerCase().includes(this.searchForm.servicePoint.toLowerCase())
            const matchStatus = !this.searchForm.status || item.status === this.searchForm.status
            return matchCode && matchPoint && matchStatus
          })
          this.pagination.total = this.filteredList.length
        },
        handleSearch() {
          this.loading = true
          setTimeout(() => {
            this.pagination.currentPage = 1
            this.applyFilters()
            this.loading = false
          }, 300)
        },
        handleReset() {
          this.searchForm = {
            deviceCode: '',
            servicePoint: '',
            status: ''
          }
          this.handleSearch()
        },
        handleSizeChange(val) {
          this.loading = true
          setTimeout(() => {
            this.pagination.pageSize = val
            this.pagination.currentPage = 1
            this.loading = false
          }, 300)
        },
        handleCurrentChange(val) {
          this.loading = true
          setTimeout(() => {
            this.pagination.currentPage = val
            this.loading = false
          }, 300)
        },
        handleDeviceChange(newVal) {
          if (newVal) {
            const device = this.allDeviceList.find(item => item.id === newVal)
            if (device) {
              this.form.deviceCode = device.deviceCode
              this.form.servicePoint = device.servicePoint
            }
          } else {
            this.form.deviceCode = ''
            this.form.servicePoint = ''
          }
        },
        handleReportFault(device) {
          this.form.deviceId = device.id
          this.form.deviceCode = device.deviceCode
          this.form.servicePoint = device.servicePoint
          this.dialogVisible = true
        },
        handleAddReport() {
          this.dialogVisible = true
        },
        handleCloseDialog() {
          this.$refs.form.resetFields()
          this.dialogVisible = false
        },
        handleSubmitFault() {
          this.$refs.form.validate((valid) => {
            if (valid) {
              this.submitting = true
              setTimeout(() => {
                this.submitting = false
                const workOrderId = generateWorkOrderId()
                this.$message.success(`故障上报成功！工单编号：${workOrderId}`)
                console.log('故障上报数据：', { ...this.form, workOrderId })
                this.handleCloseDialog()
              }, 1000)
            } else {
              this.$message.error('请完善表单信息后再提交')
              return false
            }
          })
        }
      }
    })
  </script>
</body>
</html>
