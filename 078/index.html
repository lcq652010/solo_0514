<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务服务中心自助证照打印终端运维管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css">
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
        }
        .app-container {
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .main-content {
            padding: 24px 40px;
        }
        .search-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .table-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .status-normal {
            color: #52c41a;
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-fault {
            color: #ff4d4f;
            background: #fff2f0;
            border: 1px solid #ffccc7;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-offline {
            color: #8c8c8c;
            background: #fafafa;
            border: 1px solid #d9d9d9;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-maintenance {
            color: #faad14;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .pagination-container {
            margin-top: 20px;
            text-align: right;
        }
        .hardware-status {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
        }
        .hardware-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 0;
        }
        .hardware-label {
            margin-right: 8px;
        }
        .hw-normal {
            color: #52c41a;
        }
        .hw-fault {
            color: #ff4d4f;
        }
        .row-highlight {
            background-color: #fff2f0 !important;
        }
        .warning-badge {
            position: relative;
        }
        .warning-badge::before {
            content: '!';
            position: absolute;
            top: -8px;
            right: -8px;
            width: 18px;
            height: 18px;
            background-color: #ff4d4f;
            color: white;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .fault-record {
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .record-title {
            font-size: 16px;
            font-weight: 600;
            color: #303133;
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <div class="header">
            <h1>政务服务中心自助证照打印终端运维管理系统</h1>
        </div>
        <div class="main-content">
            <div class="search-card">
                <el-form :inline="true" :model="searchForm" size="medium">
                    <el-form-item label="设备编号">
                        <el-input v-model="searchForm.deviceCode" placeholder="请输入设备编号" clearable></el-input>
                    </el-form-item>
                    <el-form-item label="安装网点">
                        <el-select v-model="searchForm.branch" placeholder="请选择安装网点" clearable>
                            <el-option label="全部网点" value=""></el-option>
                            <el-option label="市政务服务中心" value="市政务服务中心"></el-option>
                            <el-option label="区政务服务中心" value="区政务服务中心"></el-option>
                            <el-option label="街道便民服务中心" value="街道便民服务中心"></el-option>
                            <el-option label="社区服务站" value="社区服务站"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item label="设备状态">
                        <el-select v-model="searchForm.status" placeholder="请选择设备状态" clearable>
                            <el-option label="全部状态" value=""></el-option>
                            <el-option label="正常" value="normal"></el-option>
                            <el-option label="故障" value="fault"></el-option>
                            <el-option label="离线" value="offline"></el-option>
                            <el-option label="维护中" value="maintenance"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="handleSearch" icon="el-icon-search">搜索</el-button>
                        <el-button @click="handleReset" icon="el-icon-refresh">重置</el-button>
                    </el-form-item>
                </el-form>
            </div>
            
            <div class="table-card">
                <div style="margin-bottom: 16px;">
                    <el-button type="primary" @click="handleReport" icon="el-icon-warning">故障上报</el-button>
                    <span style="float: right; color: #666;">共 {{ total }} 台设备</span>
                </div>
                <el-table :data="tableData" border stripe style="width: 100%" :row-class-name="tableRowClassName">
                    <el-table-column label="设备编号" width="140" align="center">
                        <template slot-scope="scope">
                            <div :class="{'warning-badge': isDeviceFault(scope.row)}">
                                {{ scope.row.deviceCode }}
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="branch" label="安装网点" width="150" align="center"></el-table-column>
                    <el-table-column prop="location" label="安装位置" width="120" align="center"></el-table-column>
                    <el-table-column label="在线状态" width="100" align="center">
                        <template slot-scope="scope">
                            <span :class="getStatusClass(scope.row.status)">
                                {{ getStatusText(scope.row.status) }}
                            </span>
                        </template>
                    </el-table-column>
                    <el-table-column label="硬件模块状态" width="240" align="center">
                        <template slot-scope="scope">
                            <div class="hardware-status">
                                <div class="hardware-item">
                                    <span class="hardware-label">身份证阅读器</span>
                                    <span :class="scope.row.idReader ? 'hw-normal' : 'hw-fault'">
                                        {{ scope.row.idReader ? '正常' : '异常' }}
                                    </span>
                                </div>
                                <div class="hardware-item">
                                    <span class="hardware-label">打印机</span>
                                    <span :class="scope.row.printer ? 'hw-normal' : 'hw-fault'">
                                        {{ scope.row.printer ? '正常' : '异常' }}
                                    </span>
                                </div>
                                <div class="hardware-item">
                                    <span class="hardware-label">社保卡读卡器</span>
                                    <span :class="scope.row.cardReader ? 'hw-normal' : 'hw-fault'">
                                        {{ scope.row.cardReader ? '正常' : '异常' }}
                                    </span>
                                </div>
                            </div>
                        </template>
                    </el-table-column>
                    <el-table-column prop="lastOnline" label="最后在线时间" width="170" align="center"></el-table-column>
                    <el-table-column label="操作" width="180" align="center">
                        <template slot-scope="scope">
                            <el-button size="small" type="text" @click="handleView(scope.row)">查看详情</el-button>
                            <el-button size="small" type="text" @click="handleReportDevice(scope.row)" :disabled="scope.row.status === 'maintenance'">故障上报</el-button>
                        </template>
                    </el-table-column>
                </el-table>
                <div class="pagination-container">
                    <el-pagination
                        @size-change="handleSizeChange"
                        @current-change="handleCurrentChange"
                        :current-page="currentPage"
                        :page-sizes="[10, 20, 50, 100]"
                        :page-size="pageSize"
                        layout="total, sizes, prev, pager, next, jumper"
                        :total="total">
                    </el-pagination>
                </div>
            </div>

            <div class="fault-record" v-if="faultRecords.length > 0">
                <div class="record-header">
                    <span class="record-title">故障记录（共 {{ faultRecords.length }} 条）</span>
                </div>
                <el-table :data="faultRecords" border stripe style="width: 100%">
                    <el-table-column prop="orderNo" label="工单编号" width="180" align="center"></el-table-column>
                    <el-table-column prop="deviceCode" label="设备编号" width="140" align="center"></el-table-column>
                    <el-table-column prop="faultType" label="故障类型" width="120" align="center"></el-table-column>
                    <el-table-column prop="faultDesc" label="故障描述" show-overflow-tooltip></el-table-column>
                    <el-table-column prop="reporter" label="上报人" width="100" align="center"></el-table-column>
                    <el-table-column prop="reportTime" label="上报时间" width="170" align="center"></el-table-column>
                </el-table>
            </div>
        </div>

        <el-dialog title="故障上报" :visible.sync="dialogVisible" width="600px" @close="handleDialogClose">
            <el-form :model="reportForm" :rules="reportRules" ref="reportForm" label-width="100px">
                <el-form-item label="工单编号">
                    <el-input v-model="reportForm.orderNo" disabled></el-input>
                </el-form-item>
                <el-form-item label="上报时间">
                    <el-input v-model="reportForm.reportTime" disabled></el-input>
                </el-form-item>
                <el-form-item label="设备编号" prop="deviceCode">
                    <el-select v-model="reportForm.deviceCode" placeholder="请选择设备" filterable @change="onDeviceChange">
                        <el-option 
                            v-for="item in allDevices" 
                            :key="item.deviceCode" 
                            :label="item.deviceCode" 
                            :value="item.deviceCode">
                        </el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="故障类型" prop="faultType">
                    <el-select v-model="reportForm.faultType" placeholder="请选择故障类型">
                        <el-option v-for="item in faultTypeOptions" :key="item.value" :label="item.label" :value="item.value"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="故障描述" prop="faultDesc">
                    <el-input type="textarea" v-model="reportForm.faultDesc" :rows="4" placeholder="请详细描述故障情况"></el-input>
                </el-form-item>
                <el-form-item label="上报人" prop="reporter">
                    <el-input v-model="reportForm.reporter" placeholder="请输入上报人姓名"></el-input>
                </el-form-item>
                <el-form-item label="联系电话" prop="contactPhone">
                    <el-input v-model="reportForm.contactPhone" placeholder="请输入联系电话"></el-input>
                </el-form-item>
            </el-form>
            <span slot="footer" class="dialog-footer">
                <el-button @click="dialogVisible = false">取 消</el-button>
                <el-button type="primary" @click="handleSubmitReport">提 交</el-button>
            </span>
        </el-dialog>
    </div>

    <script>
        new Vue({
            el: '#app',
            data() {
                return {
                    searchForm: {
                        deviceCode: '',
                        branch: '',
                        status: ''
                    },
                    currentPage: 1,
                    pageSize: 10,
                    total: 0,
                    dialogVisible: false,
                    faultRecords: [],
                    reportForm: {
                        orderNo: '',
                        reportTime: '',
                        deviceCode: '',
                        faultType: '',
                        faultDesc: '',
                        reporter: '系统管理员',
                        contactPhone: ''
                    },
                    reportRules: {
                        deviceCode: [
                            { required: true, message: '请选择设备', trigger: 'change' }
                        ],
                        faultType: [
                            { required: true, message: '请选择故障类型', trigger: 'change' }
                        ],
                        faultDesc: [
                            { required: true, message: '请输入故障描述', trigger: 'blur' },
                            { min: 5, message: '故障描述不能少于5个字符', trigger: 'blur' }
                        ],
                        reporter: [
                            { required: true, message: '请输入上报人姓名', trigger: 'blur' }
                        ],
                        contactPhone: [
                            { required: true, message: '请输入联系电话', trigger: 'blur' },
                            { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
                        ]
                    },
                    allDevices: [],
                    mockData: []
                }
            },
            computed: {
                tableData() {
                    let data = [...this.mockData];
                    if (this.searchForm.deviceCode) {
                        data = data.filter(item => item.deviceCode.includes(this.searchForm.deviceCode));
                    }
                    if (this.searchForm.branch) {
                        data = data.filter(item => item.branch === this.searchForm.branch);
                    }
                    if (this.searchForm.status) {
                        data = data.filter(item => item.status === this.searchForm.status);
                    }
                    this.total = data.length;
                    const start = (this.currentPage - 1) * this.pageSize;
                    const end = start + this.pageSize;
                    return data.slice(start, end);
                },
                faultTypeOptions() {
                    const options = [
                        { label: '硬件故障', value: '硬件故障' },
                        { label: '软件故障', value: '软件故障' },
                        { label: '网络故障', value: '网络故障' },
                        { label: '纸张短缺', value: '纸张短缺' },
                        { label: '墨盒问题', value: '墨盒问题' },
                        { label: '其他问题', value: '其他问题' }
                    ];
                    
                    if (!this.reportForm.deviceCode) {
                        return options;
                    }
                    
                    const device = this.mockData.find(item => item.deviceCode === this.reportForm.deviceCode);
                    if (!device) {
                        return options;
                    }
                    
                    const smartOptions = [];
                    if (!device.idReader) {
                        smartOptions.push({ label: '身份证阅读器故障', value: '身份证阅读器故障' });
                    }
                    if (!device.printer) {
                        smartOptions.push({ label: '打印机故障', value: '打印机故障' });
                    }
                    if (!device.cardReader) {
                        smartOptions.push({ label: '社保卡读卡器故障', value: '社保卡读卡器故障' });
                    }
                    
                    return [...smartOptions, ...options];
                }
            },
            created() {
                this.initMockData();
            },
            methods: {
                initMockData() {
                    const branches = ['市政务服务中心', '区政务服务中心', '街道便民服务中心', '社区服务站'];
                    const locations = ['一楼大厅', '二楼办事区', '自助服务区', '进门左侧', '进门右侧'];
                    const statuses = ['normal', 'fault', 'offline', 'maintenance'];
                    
                    this.mockData = [];
                    for (let i = 1; i <= 35; i++) {
                        const branchIndex = Math.floor(Math.random() * branches.length);
                        const locationIndex = Math.floor(Math.random() * locations.length);
                        const statusIndex = Math.floor(Math.random() * statuses.length);
                        
                        this.mockData.push({
                            deviceCode: `ZZDY${String(i).padStart(4, '0')}`,
                            branch: branches[branchIndex],
                            location: locations[locationIndex],
                            status: statuses[statusIndex],
                            idReader: Math.random() > 0.2,
                            printer: Math.random() > 0.25,
                            cardReader: Math.random() > 0.15,
                            lastOnline: this.generateRandomTime()
                        });
                    }
                    this.allDevices = [...this.mockData];
                    this.total = this.mockData.length;
                },
                generateRandomTime() {
                    const now = new Date();
                    const hours = Math.floor(Math.random() * 24);
                    now.setHours(now.getHours() - hours);
                    return now.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },
                getStatusClass(status) {
                    const classMap = {
                        'normal': 'status-normal',
                        'fault': 'status-fault',
                        'offline': 'status-offline',
                        'maintenance': 'status-maintenance'
                    };
                    return classMap[status] || '';
                },
                getStatusText(status) {
                    const textMap = {
                        'normal': '正常',
                        'fault': '故障',
                        'offline': '离线',
                        'maintenance': '维护中'
                    };
                    return textMap[status] || status;
                },
                tableRowClassName({row}) {
                    if (row.status === 'fault' || !row.idReader || !row.printer || !row.cardReader) {
                        return 'row-highlight';
                    }
                    return '';
                },
                isDeviceFault(row) {
                    return row.status === 'fault' || !row.idReader || !row.printer || !row.cardReader;
                },
                onDeviceChange() {
                    this.reportForm.faultType = '';
                },
                handleSearch() {
                    this.currentPage = 1;
                },
                handleReset() {
                    this.searchForm = {
                        deviceCode: '',
                        branch: '',
                        status: ''
                    };
                    this.currentPage = 1;
                },
                handleSizeChange(val) {
                    this.pageSize = val;
                },
                handleCurrentChange(val) {
                    this.currentPage = val;
                },
                handleReport() {
                    this.generateOrderNo();
                    this.generateReportTime();
                    this.dialogVisible = true;
                },
                handleReportDevice(row) {
                    this.generateOrderNo();
                    this.generateReportTime();
                    this.reportForm.deviceCode = row.deviceCode;
                    this.dialogVisible = true;
                },
                handleView(row) {
                    this.$message.info(`查看设备 ${row.deviceCode} 详情`);
                },
                generateOrderNo() {
                    const now = new Date();
                    const dateStr = now.getFullYear().toString() + 
                                   String(now.getMonth() + 1).padStart(2, '0') +
                                   String(now.getDate()).padStart(2, '0');
                    const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                    this.reportForm.orderNo = `GD${dateStr}${random}`;
                },
                generateReportTime() {
                    const now = new Date();
                    this.reportForm.reportTime = now.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },
                handleDialogClose() {
                    this.$refs.reportForm.resetFields();
                    this.reportForm.reporter = '系统管理员';
                },
                handleSubmitReport() {
                    this.$refs.reportForm.validate((valid) => {
                        if (valid) {
                            this.$message.success('故障上报成功！工单编号：' + this.reportForm.orderNo);
                            
                            this.faultRecords.unshift({
                                orderNo: this.reportForm.orderNo,
                                deviceCode: this.reportForm.deviceCode,
                                faultType: this.reportForm.faultType,
                                faultDesc: this.reportForm.faultDesc,
                                reporter: this.reportForm.reporter,
                                reportTime: this.reportForm.reportTime
                            });
                            
                            this.dialogVisible = false;
                            const device = this.mockData.find(item => item.deviceCode === this.reportForm.deviceCode);
                            if (device) {
                                device.status = 'maintenance';
                            }
                            this.$refs.reportForm.resetFields();
                            this.reportForm.reporter = '系统管理员';
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
